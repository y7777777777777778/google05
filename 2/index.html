.gb_D{box-sizing:border-box;display:inline-block;height:48px;outline:none;padding:4px;position:relative}
.gb_C{background-color:transparent;border:0;display:inline-block;height:40px;padding:4px;position:relative;width:40px;cursor:pointer;border-radius:50%;-webkit-tap-highlight-color:transparent}

.gb_F{fill:#444746;color:#444746;display:block;width:20px;height:20px}

.logo{margin-bottom:28px}
.logo img{width:272px;height:92px;display:block}

.modal-logo{display:flex;justify-content:center;margin-bottom:24px}

.modal-field{position:relative;margin-bottom:20px}
.modal-field input{width:100%;padding:14px;border:1px solid #747775;border-radius:4px;font-size:16px;outline:none;font-family:Arial,sans-serif;color:#202124;background:transparent;transition:border-color .15s;-moz-appearance:textfield}

.modal-field label{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:16px;color:#444746;pointer-events:none;transition:all .15s ease;background:#fff;padding:0 4px;line-height:1}
.modal-field input:focus~label,.modal-field input:not(:placeholder-shown)~label{top:0;font-size:12px;color:#0b57d0;transform:translateY(-50%)}

.btn-next:hover{background:#0842a0;box-shadow:0 2px 6px rgba(60,64,67,.3)}
.btn-next:disabled{background:#94b9f5;cursor:not-allowed;box-shadow:none}

#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

      <input type="text" id="nameInput" placeholder=" " maxlength="20" autocomplete="off">
      <label for="nameInput">表示名（例: たろう）</label>
    </div>

    <!-- エラーメッセージ -->
    <div id="nameErrMsg"></div>

    <!-- アクションボタン -->
    <div class="modal-actions">
      <button class="btn-cancel" id="cancelBtn">キャンセル</button>
      <button class="btn-next" id="submitBtn">次へ</button>
    </div>
  </div>
</div>

<!-- ========== トースト ========== -->
<div id="toast"></div>

<!-- ========== 入力クリアボタン制御 ========== -->
<script>
  const qInput   = document.getElementById('APjFqb');
  const clearBtn = document.getElementById('clearBtn');
  if (qInput && clearBtn) {
    qInput.addEventListener('input', () => {
      clearBtn.style.display = qInput.value ? 'flex' : 'none';
    });
    clearBtn.addEventListener('click', () => {
      qInput.value = '';
      clearBtn.style.display = 'none';
      qInput.focus();
    });
  }
</script>

<!-- ========== Firebase SDK ========== -->
<script type="module">
  import { initializeApp }
    from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
  import {
    getFirestore, collection, addDoc, query, where,
    getDocs, doc, getDoc, deleteDoc, onSnapshot
  } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

  /* ===== Firebase 設定 ===== */
  const firebaseConfig = {
    apiKey:            "AIzaSyDmv5WbPp6298HNLSOa6h0AMuieM0H6l1s",
    authDomain:        "fir-66339.firebaseapp.com",
    projectId:         "fir-66339",
    storageBucket:     "fir-66339.firebasestorage.app",
    messagingSenderId: "876017617963",
    appId:             "1:876017617963:web:5ba304f8f6e0d9dff0ae6e"
  };

  const app = initializeApp(firebaseConfig);
  const db  = getFirestore(app);

  /* ===== グループ2用定数 ===== */
  const MY_GROUP   = '2';
  const KIYAKU_KEY = 'kiyaku_agreed_2';
  const NAME_KEY   = 'accessUserName_2';
  const STATUS_KEY = 'accessStatus_2';
  const KIYAKU_URL = 'kiyaku.html';
  const PEJI_URL   = 'peji.html';

  /* ===== リアルタイム監視（アク禁・拒否を即反映） ===== */
  (function startRealtimeCheck() {
    const savedName = localStorage.getItem(NAME_KEY);
    if (!savedName) return;

    const flagKey = "reset_" + savedName.replace(
      /[^a-zA-Z0-9\u3000-\u9fff\u30A0-\u30FF\u3040-\u309F]/g, "_"
    );

    /* usersドキュメントを監視 */
    const userQuery = query(collection(db, "users"), where("name", "==", savedName));
    onSnapshot(userQuery, async snap => {
      if (snap.empty) {
        /* Firestoreに存在しない → resetフラグ確認 */
        try {
          const flagSnap = await getDoc(doc(db, "config", flagKey));
          if (flagSnap.exists() && flagSnap.data().autoOk === true) {
            localStorage.removeItem(NAME_KEY);
            localStorage.removeItem(STATUS_KEY);
            document.getElementById("hiddenFrame").style.display = "none";
            sessionStorage.setItem("autoOk_pending", "1");
            document.getElementById("overlay").classList.add("active");
            setTimeout(() => {
              const ri = document.getElementById("realNameInput");
              if (ri) ri.focus();
            }, 100);
            return;
          }
        } catch(e) {}
        localStorage.removeItem(NAME_KEY);
        localStorage.removeItem(STATUS_KEY);
        location.replace("https://www.google.com");
        return;
      }
      const data = snap.docs[0].data();
      if (data.status === "ng") {
        localStorage.removeItem(NAME_KEY);
        localStorage.removeItem(STATUS_KEY);
        location.replace("https://www.google.com");
        return;
      }
      if (data.group && data.group !== MY_GROUP) {
        localStorage.removeItem(NAME_KEY);
        localStorage.removeItem(STATUS_KEY);
        location.replace("https://www.google.com");
      }
    });

    /* banListを監視 */
    onSnapshot(doc(db, "config", "banList"), snap => {
      if (!snap.exists()) return;
      const data = snap.data();
      if (data.allBanned === true) {
        localStorage.removeItem(NAME_KEY);
        localStorage.removeItem(STATUS_KEY);
        location.replace("https://www.google.com");
        return;
      }
      const names = data.names || [];
      if (names.includes(savedName)) {
        localStorage.removeItem(NAME_KEY);
        localStorage.removeItem(STATUS_KEY);
        location.replace("https://www.google.com");
      }
    });
  })();

  /* ===== DOM要素取得 ===== */
  const overlay     = document.getElementById("overlay");
  const nameInput   = document.getElementById("nameInput");
  const submitBtn   = document.getElementById("submitBtn");
  const cancelBtn   = document.getElementById("cancelBtn");
  const hiddenFrame = document.getElementById("hiddenFrame");
  const toast       = document.getElementById("toast");

  /* ===== ユーティリティ ===== */
  function showToast(msg, duration = 3500) {
    toast.textContent = msg;
    toast.classList.add("show");
    setTimeout(() => toast.classList.remove("show"), duration);
  }

  async function getUserStatus(name) {
    const q        = query(collection(db, "users"), where("name", "==", name));
    const snapshot = await getDocs(q);
    if (snapshot.empty) return null;
    return snapshot.docs[0].data().status;
  }

  async function isPublicMode() {
    try {
      const snap = await getDocs(
        query(collection(db, "config"), where("key", "==", "publicMode"))
      );
      if (snap.empty) return false;
      return snap.docs[0].data().value === true;
    } catch(e) { return false; }
  }

  async function nameExists(name) {
    const q    = query(collection(db, "users"), where("name", "==", name));
    const snap = await getDocs(q);
    return !snap.empty;
  }

  async function registerUser(name, realName, className) {
    const autoOk     = sessionStorage.getItem("autoOk_pending") === "1";
    const publicMode = autoOk ? true : await isPublicMode();
    if (autoOk) {
      try {
        const flagKey = "reset_" + name.replace(
          /[^a-zA-Z0-9\u3000-\u9fff\u30A0-\u30FF\u3040-\u309F]/g, "_"
        );
        await deleteDoc(doc(db, "config", flagKey));
      } catch(e) {}
      sessionStorage.removeItem("autoOk_pending");
    }
    await addDoc(collection(db, "users"), {
      name,
      realName,
      class:     className,
      status:    publicMode ? "ok" : "wait",
      group:     MY_GROUP,
      createdAt: new Date()
    });
    return publicMode;
  }

  async function resolveDestUrl(name) {
    try {
      const q    = query(collection(db, "users"), where("name", "==", name));
      const snap = await getDocs(q);
      if (!snap.empty && snap.docs[0].data().isAdmin === true) {
        return 'pej.html';
      }
    } catch(e) {}
    return PEJI_URL;
  }

  /* ===== モーダル操作 ===== */
  function openModal() {
    document.getElementById("realNameInput").value = "";
    document.getElementById("classInput").value    = "";
    nameInput.value = "";
    ["realNameInput", "classInput", "nameInput"].forEach(id => {
      const el = document.getElementById(id);
      if (el) { el.style.borderColor = ""; el.style.borderWidth = ""; }
    });
    const errMsg = document.getElementById("nameErrMsg");
    if (errMsg) { errMsg.textContent = ""; errMsg.classList.remove("visible"); }
    overlay.classList.add("active");
    setTimeout(() => document.getElementById("realNameInput").focus(), 100);
  }

  function closeModal() {
    overlay.classList.remove("active");
  }

  /* ===== ページ（iframe）操作 ===== */
  let pejiLoaded = false;

  function openPeji(url) {
    const dest = url || PEJI_URL;
    if (localStorage.getItem(KIYAKU_KEY) !== '1') {
      hiddenFrame.src = KIYAKU_URL;
      pejiLoaded = false;
    } else if (!pejiLoaded || hiddenFrame.src.indexOf(dest) === -1) {
      hiddenFrame.src = dest;
      pejiLoaded = true;
    }
    hiddenFrame.style.display = "block";
  }

  function closePeji() {
    hiddenFrame.style.display = "none";
  }

  /* ===== Ctrl+U（元の機能そのまま） ===== */
  document.addEventListener("keydown", async function(e) {
    if (!(e.ctrlKey && e.key === "u")) return;
    e.preventDefault();

    if (hiddenFrame.style.display === "block") {
      closePeji();
      return;
    }

    const savedName = localStorage.getItem(NAME_KEY);
    if (!savedName) {
      openModal();
      return;
    }

    /* Firestoreで存在確認（削除済みユーザーを弾く） */
    try {
      const status = await getUserStatus(savedName);
      if (!status) {
        localStorage.removeItem(NAME_KEY);
        localStorage.removeItem(STATUS_KEY);
        hiddenFrame.src = "";
        pejiLoaded = false;
        openModal();
        return;
      }
      localStorage.setItem(STATUS_KEY, status);
      if (status === "ok") {
        const dest = await resolveDestUrl(savedName);
        pejiLoaded = false;
        hiddenFrame.src = "";
        openPeji(dest);
      } else if (status === "wait") {
        showToast("⏳ まだ承認待ちです");
      } else if (status === "ng") {
        localStorage.removeItem(NAME_KEY);
        localStorage.removeItem(STATUS_KEY);
        hiddenFrame.src = "";
        pejiLoaded = false;
      }
    } catch (err) {
      console.error("Firestore エラー:", err);
      showToast("通信エラー。再度お試しください。");
    }
  });

  /* ===== 申請ボタン ===== */
  submitBtn.addEventListener("click", async function() {
    const realName  = document.getElementById("realNameInput").value.trim();
    const classRaw  = document.getElementById("classInput").value.trim();
    const className = classRaw + "組";
    const name      = nameInput.value.trim();

    /* バリデーション */
    const errMsg = document.getElementById("nameErrMsg");
    errMsg.textContent = "";
    errMsg.classList.remove("visible");

    const highlight = id => {
      const el = document.getElementById(id);
      el.focus();
      el.style.borderColor = "#b3261e";
      setTimeout(() => { el.style.borderColor = ""; }, 1800);
    };

    if (!realName)  { highlight("realNameInput"); return; }
    if (!classRaw)  { highlight("classInput");    return; }
    if (!name)      { highlight("nameInput");     return; }

    submitBtn.disabled    = true;
    submitBtn.textContent = "確認中...";

    try {
      const exists = await nameExists(name);
      if (exists) {
        nameInput.style.borderColor = "#b3261e";
        submitBtn.disabled    = false;
        submitBtn.textContent = "次へ";
        errMsg.textContent    = "その表示名は既に使われています。別の表示名を入力してください。";
        errMsg.classList.add("visible");
        nameInput.focus();
        return;
      }
      const isPublic = await registerUser(name, realName, className);
      localStorage.setItem(NAME_KEY,   name);
      localStorage.setItem(STATUS_KEY, isPublic ? "ok" : "wait");
      closeModal();
      if (isPublic) {
        const dest = await resolveDestUrl(name);
        openPeji(dest);
      } else {
        showToast("✅ 申請を送りました。管理者の承認をお待ちください。");
      }
    } catch (err) {
      console.error("登録エラー:", err);
      showToast("エラーが発生しました。もう一度お試しください。");
    }

    submitBtn.disabled    = false;
    submitBtn.textContent = "次へ";
  });

  /* ===== キーボード・オーバーレイ操作 ===== */
  nameInput.addEventListener("keydown", e => {
    if (e.key === "Enter") submitBtn.click();
  });
  cancelBtn.addEventListener("click", closeModal);
  overlay.addEventListener("click", e => {
    if (e.target === overlay) closeModal();
  });

  /* ===== 検索機能 ===== */
  window.doSearch = function() {
    const q = document.getElementById("APjFqb").value.trim();
    if (q) location.href = "https://www.google.com/search?q=" + encodeURIComponent(q);
    return false;
  };

  window.luckySearch = function() {
    const q = document.getElementById("APjFqb").value.trim();
    if (q) {
      location.href = "https://www.google.com/search?q=" + encodeURIComponent(q) + "&btnI=1";
    } else {
      location.href = "https://www.google.com/doodles";
    }
    return false;
  };

</script>
</body>
</html>
