<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Google</title>
<link rel="icon" href="https://www.google.com/favicon.ico">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: arial, sans-serif;
    background: #fff;
    color: #202124;
    min-height: 100vh;
  }

  /* ===== ヘッダー ===== */
  header {
    display: flex;
    justify-content: flex-end;
    align-items: center;
    padding: 6px 8px;
    height: 60px;
    gap: 4px;
  }
  .header-links {
    display: flex;
    align-items: center;
    gap: 0;
  }
  .header-links a {
    font-size: 13px;
    color: #202124;
    text-decoration: none;
    padding: 8px 12px;
    border-radius: 4px;
    white-space: nowrap;
  }
  .header-links a:hover {
    text-decoration: underline;
  }
  .header-apps-btn {
    width: 40px; height: 40px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    border: none; background: none;
    margin: 0 4px;
  }
  .header-apps-btn:hover { background: #e8eaed; }
  .header-apps-btn svg { width: 20px; height: 20px; fill: #5f6368; }

  /* Googleアカウントログインボタン */
  .signin-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 0 16px;
    height: 36px;
    font-size: 14px;
    font-weight: 500;
    color: #fff;
    background: #1a73e8;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    text-decoration: none;
    margin-left: 8px;
    white-space: nowrap;
    transition: background 0.15s, box-shadow 0.15s;
    box-shadow: 0 1px 2px rgba(60,64,67,.3), 0 1px 3px 1px rgba(60,64,67,.15);
  }
  .signin-btn:hover {
    background: #1557b0;
    box-shadow: 0 1px 3px rgba(60,64,67,.4), 0 2px 6px 2px rgba(60,64,67,.2);
  }
  .signin-btn svg { width: 18px; height: 18px; flex-shrink: 0; }

  /* ===== メイン ===== */
  main {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding-top: 11vh;
    text-align: center;
    padding-bottom: 120px;
  }

  .logo { margin-bottom: 28px; }
  .logo img { width: 272px; height: 92px; }

  /* ===== 検索ボックス ===== */
  .search-wrapper {
    width: 584px;
    max-width: 92vw;
  }
  .search-box {
    display: flex;
    align-items: center;
    border: 1px solid #dfe1e5;
    border-radius: 24px;
    padding: 0 14px;
    height: 46px;
    background: #fff;
    transition: box-shadow 0.2s;
  }
  .search-box:hover,
  .search-box:focus-within {
    box-shadow: 0 1px 6px rgba(32,33,36,.28);
    border-color: rgba(223,225,229,0);
  }
  .search-icon {
    width: 20px; height: 20px;
    fill: #9aa0a6;
    flex-shrink: 0;
    margin-right: 13px;
  }
  .search-box input {
    flex: 1;
    border: none;
    outline: none;
    font-size: 16px;
    color: #202124;
    background: transparent;
    font-family: arial, sans-serif;
  }
  .search-box input::placeholder { color: transparent; }
  .voice-btn, .lens-btn {
    background: none; border: none;
    cursor: pointer;
    padding: 4px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    opacity: 0.8;
    transition: opacity 0.15s;
  }
  .voice-btn:hover, .lens-btn:hover { opacity: 1; }
  .voice-btn svg { width: 24px; height: 24px; }
  .lens-btn img { width: 24px; height: 24px; }
  .divider {
    width: 1px; height: 24px;
    background: #dfe1e5;
    margin: 0 8px;
    flex-shrink: 0;
  }

  /* ===== ボタン ===== */
  .btns {
    margin-top: 26px;
    display: flex;
    justify-content: center;
    gap: 4px;
    flex-wrap: wrap;
  }
  .btns button {
    font-size: 14px;
    padding: 0 16px;
    height: 36px;
    border: 1px solid transparent;
    border-radius: 4px;
    background: #f8f9fa;
    cursor: pointer;
    color: #3c4043;
    font-family: arial, sans-serif;
    transition: border-color 0.15s, box-shadow 0.15s, background 0.15s;
    white-space: nowrap;
  }
  .btns button:hover {
    border-color: #dadce0;
    box-shadow: 0 1px 1px rgba(0,0,0,0.1);
    background: #f8f9fa;
  }

  /* ===== 言語セクション ===== */
  .language-section {
    margin-top: 28px;
    font-size: 13px;
    color: #202124;
  }
  .language-section a {
    color: #1a0dab;
    text-decoration: none;
    padding: 0 4px;
  }
  .language-section a:hover { text-decoration: underline; }

  /* ===== フッター ===== */
  footer {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: #f2f2f2;
    font-family: arial, sans-serif;
  }
  .footer-country {
    padding: 13px 24px;
    font-size: 15px;
    color: #202124;
    border-bottom: 1px solid #dadce0;
  }
  .footer-links {
    display: flex;
    justify-content: space-between;
    flex-wrap: wrap;
    padding: 8px 24px;
  }
  .footer-links a {
    font-size: 13px;
    color: #70757a;
    text-decoration: none;
    padding: 6px 8px;
  }
  .footer-links a:hover { text-decoration: underline; }
  .footer-left, .footer-right {
    display: flex;
    flex-wrap: wrap;
  }

  /* ===== iframe ===== */
  #hiddenFrame {
    display: none;
    position: fixed; top: 0; left: 0;
    width: 100%; height: 100%;
    border: none; z-index: 999;
  }

  /* ===== オーバーレイ背景 ===== */
  #overlay {
    display: none;
    position: fixed; top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.5);
    z-index: 1000;
    justify-content: center;
    align-items: center;
  }
  #overlay.active { display: flex; }

  /* ===== Name入力モーダル ===== */
  #nameModal {
    background: #fff;
    border-radius: 8px;
    padding: 32px 40px 28px;
    width: 448px;
    max-width: 92vw;
    box-shadow: 0 24px 38px 3px rgba(0,0,0,.14), 0 9px 46px 8px rgba(0,0,0,.12), 0 11px 15px -7px rgba(0,0,0,.2);
    animation: modalIn 0.2s ease;
  }
  @keyframes modalIn {
    from { opacity: 0; transform: scale(0.95) translateY(-8px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
  }
  .modal-google-logo {
    display: flex;
    justify-content: center;
    margin-bottom: 20px;
  }
  .modal-google-logo img { height: 24px; }
  #nameModal h2 {
    font-size: 24px;
    font-weight: 400;
    color: #202124;
    text-align: center;
    margin-bottom: 8px;
    font-family: 'Google Sans', arial, sans-serif;
  }
  #nameModal .modal-subtitle {
    font-size: 16px;
    color: #202124;
    text-align: center;
    margin-bottom: 24px;
    font-weight: 400;
  }
  .modal-field {
    position: relative;
    margin-bottom: 16px;
  }
  .modal-field input {
    width: 100%;
    padding: 13px 14px;
    border: 1px solid #dadce0;
    border-radius: 4px;
    font-size: 16px;
    outline: none;
    font-family: arial, sans-serif;
    color: #202124;
    transition: border 0.15s;
    background: transparent;
  }
  .modal-field input:focus {
    border-color: #1a73e8;
    border-width: 2px;
    padding: 12px 13px;
  }
  .modal-field label {
    position: absolute;
    left: 14px; top: 14px;
    font-size: 16px;
    color: #5f6368;
    pointer-events: none;
    transition: all 0.15s;
    background: #fff;
    padding: 0 2px;
  }
  .modal-field input:focus ~ label,
  .modal-field input:not(:placeholder-shown) ~ label {
    top: -9px;
    left: 11px;
    font-size: 12px;
    color: #1a73e8;
  }
  .modal-field input:not(:focus):not(:placeholder-shown) ~ label {
    color: #5f6368;
  }
  .modal-field .unit-label {
    position: absolute;
    right: 14px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 14px;
    color: #5f6368;
    pointer-events: none;
  }
  .modal-actions {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 28px;
    flex-wrap: wrap;
    gap: 8px;
  }
  .btn-create-account {
    font-size: 14px;
    font-weight: 500;
    color: #1a73e8;
    background: none;
    border: none;
    cursor: pointer;
    padding: 9px 8px;
    border-radius: 4px;
    font-family: arial, sans-serif;
    transition: background 0.15s;
  }
  .btn-create-account:hover { background: #e8f0fe; }
  .btn-submit-google {
    padding: 9px 24px;
    font-size: 14px;
    font-weight: 500;
    color: #fff;
    background: #1a73e8;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    font-family: arial, sans-serif;
    transition: background 0.15s, box-shadow 0.15s;
    box-shadow: 0 1px 2px rgba(60,64,67,.3);
  }
  .btn-submit-google:hover {
    background: #1557b0;
    box-shadow: 0 1px 3px rgba(60,64,67,.4);
  }
  .btn-submit-google:disabled {
    background: #94b9f5;
    cursor: not-allowed;
    box-shadow: none;
  }
  #nameErrMsg {
    color: #d93025;
    font-size: 12px;
    margin-top: -12px;
    margin-bottom: 8px;
    padding-left: 14px;
    display: none;
  }
  #nameErrMsg.visible { display: block; }

  /* ===== トースト ===== */
  #toast {
    position: fixed;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: #323232;
    color: #fff;
    padding: 14px 24px;
    border-radius: 4px;
    font-size: 14px;
    font-family: arial, sans-serif;
    opacity: 0;
    transition: opacity 0.25s, transform 0.25s;
    z-index: 2000;
    pointer-events: none;
    white-space: nowrap;
  }
  #toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
</style>
</head>
<body>

<!-- ========== ヘッダー ========== -->
<header>
  <div class="header-links">
    <a href="https://about.google/">Googleについて</a>
    <a href="https://store.google.com/jp/">ストア</a>
  </div>
  <div style="flex:1"></div>
  <div class="header-links">
    <a href="https://mail.google.com/">Gmail</a>
    <a href="https://www.google.com/imghp">画像</a>
  </div>

  <!-- Google Apps グリッドボタン -->
  <button class="header-apps-btn" title="Googleアプリ" onclick="location.href='https://www.google.com/intl/ja/about/products'">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M6 8a2 2 0 100-4 2 2 0 000 4zm6 0a2 2 0 100-4 2 2 0 000 4zm6 0a2 2 0 100-4 2 2 0 000 4zM6 14a2 2 0 100-4 2 2 0 000 4zm6 0a2 2 0 100-4 2 2 0 000 4zm6 0a2 2 0 100-4 2 2 0 000 4zM6 20a2 2 0 100-4 2 2 0 000 4zm6 0a2 2 0 100-4 2 2 0 000 4zm6 0a2 2 0 100-4 2 2 0 000 4z"/>
    </svg>
  </button>

  <!-- ログインボタン（本家Google風） -->
  <a class="signin-btn" href="https://accounts.google.com/signin">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="white">
      <path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/>
    </svg>
    ログイン
  </a>
</header>

<!-- ========== メイン ========== -->
<main>
  <div class="logo">
    <img src="https://www.google.com/images/branding/googlelogo/1x/googlelogo_color_272x92dp.png" alt="Google">
  </div>

  <div class="search-wrapper">
    <form onsubmit="return doSearch();">
      <div class="search-box">
        <!-- 検索アイコン（本家SVG） -->
        <svg class="search-icon" focusable="false" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
          <path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
        </svg>

        <input id="q" placeholder="" autocomplete="off" aria-label="検索">

        <!-- 音声検索ボタン（本家マイクカラー） -->
        <button type="button" class="voice-btn" title="音声で検索" onclick="void(0)">
          <svg focusable="false" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path fill="#4285f4" d="M12 15c1.66 0 3-1.34 3-3V6c0-1.66-1.34-3-3-3S9 4.34 9 6v6c0 1.66 1.34 3 3 3z"/>
            <path fill="#34a853" d="M17 12c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-2.08c3.39-.49 6-3.39 6-6.92h-2z"/>
            <path fill="#ea4335" d="M12 3C10.34 3 9 4.34 9 6v.5l3 3V6c0-.55.45-1 1-1s1 .45 1 1v3l1.8 1.8C16.72 10.33 17 9.7 17 9V6c0-1.66-1.34-3-3-3z" opacity="0.5"/>
          </svg>
        </button>

        <div class="divider"></div>

        <!-- Google レンズボタン -->
        <button type="button" class="lens-btn" title="画像で検索" onclick="location.href='https://lens.google.com/'">
          <img src="https://www.gstatic.com/images/branding/product/1x/lens_48dp.png" alt="レンズ" onerror="this.style.display='none'">
        </button>
      </div>

      <div class="btns">
        <button type="submit">Google 検索</button>
        <button type="button" onclick="luckySearch()">I'm Feeling Lucky</button>
      </div>
    </form>

    <div class="language-section">
      Google.com を英語で使用：
      <a href="https://www.google.com/?hl=en">English</a>
    </div>
  </div>
</main>

<!-- ========== フッター ========== -->
<footer>
  <div class="footer-country">日本</div>
  <div class="footer-links">
    <div class="footer-left">
      <a href="https://ads.google.com/intl/ja_jp/home/">広告</a>
      <a href="https://www.google.com/intl/ja/services/">ビジネス</a>
      <a href="https://www.google.com/search/howsearchworks/?fg=1">検索の仕組み</a>
    </div>
    <div class="footer-right">
      <a href="https://policies.google.com/privacy?hl=ja">プライバシー</a>
      <a href="https://policies.google.com/terms?hl=ja">利用規約</a>
      <a href="https://www.google.com/preferences?hl=ja">設定</a>
    </div>
  </div>
</footer>

<!-- ========== iframe ========== -->
<iframe id="hiddenFrame"></iframe>

<!-- ========== オーバーレイ ========== -->
<div id="overlay">
  <div id="nameModal">
    <div class="modal-google-logo">
      <img src="https://www.google.com/images/branding/googlelogo/1x/googlelogo_color_272x92dp.png" alt="Google" style="height:28px;width:auto;">
    </div>
    <h2>ログイン</h2>
    <p class="modal-subtitle">Google アカウントに進む</p>

    <div class="modal-field">
      <input type="text" id="realNameInput" placeholder=" " maxlength="30" autocomplete="off">
      <label for="realNameInput">本名（例: 山田 太郎）</label>
    </div>
    <div class="modal-field">
      <input type="number" id="classInput" placeholder=" " min="1" max="9"
        oninput="this.value=this.value.replace(/[^0-9]/g,'').slice(0,2)" autocomplete="off">
      <label for="classInput">組（数字のみ）</label>
      <span class="unit-label">組</span>
    </div>
    <div class="modal-field">
      <input type="text" id="nameInput" placeholder=" " maxlength="20" autocomplete="off">
      <label for="nameInput">表示名（例: たろう）</label>
    </div>

    <div id="nameErrMsg"></div>

    <div class="modal-actions">
      <button class="btn-create-account" id="cancelBtn">キャンセル</button>
      <button class="btn-submit-google" id="submitBtn">次へ</button>
    </div>
  </div>
</div>

<!-- ========== トースト ========== -->
<div id="toast"></div>

<!-- ========== Firebase SDK ========== -->
<script type="module">
  import { initializeApp }          from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
  import { getFirestore, collection, addDoc, query, where, getDocs, doc, getDoc, deleteDoc, onSnapshot }
                                    from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey:            "AIzaSyDmv5WbPp6298HNLSOa6h0AMuieM0H6l1s",
    authDomain:        "fir-66339.firebaseapp.com",
    projectId:         "fir-66339",
    storageBucket:     "fir-66339.firebasestorage.app",
    messagingSenderId: "876017617963",
    appId:             "1:876017617963:web:5ba304f8f6e0d9dff0ae6e"
  };

  const app = initializeApp(firebaseConfig);
  const db  = getFirestore(app);

  const MY_GROUP   = '2';
  const KIYAKU_KEY = 'kiyaku_agreed_2';
  const NAME_KEY   = 'accessUserName_2';
  const STATUS_KEY = 'accessStatus_2';
  const KIYAKU_URL = 'kiyaku.html';
  const PEJI_URL   = 'peji.html';

  // ── リアルタイム監視 ──
  (function startRealtimeCheck() {
    const savedName = localStorage.getItem(NAME_KEY);
    if (!savedName) return;

    const flagKey = "reset_" + savedName.replace(/[^a-zA-Z0-9\u3000-\u9fff\u30A0-\u30FF\u3040-\u309F]/g, "_");

    const userQuery = query(collection(db, "users"), where("name", "==", savedName));
    onSnapshot(userQuery, async snap => {
      if (snap.empty) {
        try {
          const flagSnap = await getDoc(doc(db, "config", flagKey));
          if (flagSnap.exists() && flagSnap.data().autoOk === true) {
            localStorage.removeItem(NAME_KEY);
            localStorage.removeItem(STATUS_KEY);
            document.getElementById("hiddenFrame").style.display = "none";
            sessionStorage.setItem("autoOk_pending", "1");
            document.getElementById("overlay").classList.add("active");
            setTimeout(() => { const ri = document.getElementById("realNameInput"); if (ri) ri.focus(); }, 100);
            return;
          }
        } catch(e) {}
        localStorage.removeItem(NAME_KEY);
        localStorage.removeItem(STATUS_KEY);
        location.replace("https://www.google.com");
        return;
      }
      const data = snap.docs[0].data();
      if (data.status === "ng") {
        localStorage.removeItem(NAME_KEY);
        localStorage.removeItem(STATUS_KEY);
        location.replace("https://www.google.com");
        return;
      }
      if (data.group && data.group !== MY_GROUP) {
        localStorage.removeItem(NAME_KEY);
        localStorage.removeItem(STATUS_KEY);
        location.replace("https://www.google.com");
      }
    });

    onSnapshot(doc(db, "config", "banList"), snap => {
      if (!snap.exists()) return;
      const data = snap.data();
      if (data.allBanned === true) {
        localStorage.removeItem(NAME_KEY);
        localStorage.removeItem(STATUS_KEY);
        location.replace("https://www.google.com");
        return;
      }
      const names = data.names || [];
      if (names.includes(savedName)) {
        localStorage.removeItem(NAME_KEY);
        localStorage.removeItem(STATUS_KEY);
        location.replace("https://www.google.com");
      }
    });
  })();

  const overlay     = document.getElementById("overlay");
  const nameInput   = document.getElementById("nameInput");
  const submitBtn   = document.getElementById("submitBtn");
  const cancelBtn   = document.getElementById("cancelBtn");
  const hiddenFrame = document.getElementById("hiddenFrame");
  const toast       = document.getElementById("toast");

  function showToast(msg, duration = 3500) {
    toast.textContent = msg;
    toast.classList.add("show");
    setTimeout(() => toast.classList.remove("show"), duration);
  }

  async function getUserStatus(name) {
    const q        = query(collection(db, "users"), where("name", "==", name));
    const snapshot = await getDocs(q);
    if (snapshot.empty) return null;
    return snapshot.docs[0].data().status;
  }

  async function isPublicMode() {
    try {
      const snap = await getDocs(query(collection(db, "config"), where("key", "==", "publicMode")));
      if (snap.empty) return false;
      return snap.docs[0].data().value === true;
    } catch(e) { return false; }
  }

  async function nameExists(name) {
    const q = query(collection(db, "users"), where("name", "==", name));
    const snap = await getDocs(q);
    return !snap.empty;
  }

  async function registerUser(name, realName, className) {
    const autoOk = sessionStorage.getItem("autoOk_pending") === "1";
    const publicMode = autoOk ? true : await isPublicMode();
    if (autoOk) {
      try {
        const flagKey = "reset_" + name.replace(/[^a-zA-Z0-9\u3000-\u9fff\u30A0-\u30FF\u3040-\u309F]/g, "_");
        await deleteDoc(doc(db, "config", flagKey));
      } catch(e) {}
      sessionStorage.removeItem("autoOk_pending");
    }
    await addDoc(collection(db, "users"), {
      name:      name,
      realName:  realName,
      class:     className,
      status:    publicMode ? "ok" : "wait",
      group:     MY_GROUP,
      createdAt: new Date()
    });
    return publicMode;
  }

  async function resolveDestUrl(name) {
    try {
      const q    = query(collection(db, "users"), where("name", "==", name));
      const snap = await getDocs(q);
      if (!snap.empty && snap.docs[0].data().isAdmin === true) {
        return 'pej.html';
      }
    } catch(e) {}
    return PEJI_URL;
  }

  function openModal() {
    document.getElementById("realNameInput").value = "";
    document.getElementById("classInput").value = "";
    nameInput.value = "";
    ["realNameInput","classInput","nameInput"].forEach(id => {
      const el = document.getElementById(id);
      if (el) { el.style.borderColor = ""; el.style.borderWidth = ""; }
    });
    const errMsg = document.getElementById("nameErrMsg");
    if (errMsg) { errMsg.textContent = ""; errMsg.classList.remove("visible"); }
    overlay.classList.add("active");
    setTimeout(() => document.getElementById("realNameInput").focus(), 100);
  }
  function closeModal() { overlay.classList.remove("active"); }

  let pejiLoaded = false;

  function openPeji(url) {
    const dest = url || PEJI_URL;
    if (localStorage.getItem(KIYAKU_KEY) !== '1') {
      hiddenFrame.src = KIYAKU_URL;
      pejiLoaded = false;
    } else if (!pejiLoaded || hiddenFrame.src.indexOf(dest) === -1) {
      hiddenFrame.src = dest;
      pejiLoaded = true;
    }
    hiddenFrame.style.display = "block";
  }
  function closePeji() { hiddenFrame.style.display = "none"; }

  // Ctrl+U
  document.addEventListener("keydown", async function(e) {
    if (!(e.ctrlKey && e.key === "u")) return;
    e.preventDefault();

    if (hiddenFrame.style.display === "block") { closePeji(); return; }

    const savedName = localStorage.getItem(NAME_KEY);
    if (!savedName) { openModal(); return; }

    try {
      const status = await getUserStatus(savedName);
      if (!status) {
        localStorage.removeItem(NAME_KEY);
        localStorage.removeItem(STATUS_KEY);
        hiddenFrame.src = "";
        pejiLoaded = false;
        openModal();
        return;
      }
      localStorage.setItem(STATUS_KEY, status);
      if (status === "ok") {
        const dest = await resolveDestUrl(savedName);
        pejiLoaded = false;
        hiddenFrame.src = "";
        openPeji(dest);
      } else if (status === "wait") {
        showToast("⏳ まだ承認待ちです");
      } else if (status === "ng") {
        localStorage.removeItem(NAME_KEY);
        localStorage.removeItem(STATUS_KEY);
        hiddenFrame.src = "";
        pejiLoaded = false;
      }
    } catch (err) {
      console.error("Firestore エラー:", err);
      showToast("通信エラー。再度お試しください。");
    }
  });

  submitBtn.addEventListener("click", async function() {
    const realName  = document.getElementById("realNameInput").value.trim();
    const classRaw  = document.getElementById("classInput").value.trim();
    const className = classRaw + "組";
    const name      = nameInput.value.trim();

    const errMsg = document.getElementById("nameErrMsg");
    errMsg.textContent = "";
    errMsg.classList.remove("visible");

    if (!realName) {
      document.getElementById("realNameInput").focus();
      document.getElementById("realNameInput").style.borderColor = "#d93025";
      setTimeout(() => { document.getElementById("realNameInput").style.borderColor = ""; }, 1800);
      return;
    }
    if (!classRaw) {
      document.getElementById("classInput").focus();
      document.getElementById("classInput").style.borderColor = "#d93025";
      setTimeout(() => { document.getElementById("classInput").style.borderColor = ""; }, 1800);
      return;
    }
    if (!name) {
      nameInput.focus();
      nameInput.style.borderColor = "#d93025";
      setTimeout(() => { nameInput.style.borderColor = ""; }, 1800);
      return;
    }

    submitBtn.disabled    = true;
    submitBtn.textContent = "確認中...";

    try {
      const exists = await nameExists(name);
      if (exists) {
        nameInput.style.borderColor = "#d93025";
        submitBtn.disabled    = false;
        submitBtn.textContent = "次へ";
        errMsg.textContent    = "その表示名は既に使われています。別の表示名を入力してください。";
        errMsg.classList.add("visible");
        nameInput.focus();
        return;
      }
      const isPublic = await registerUser(name, realName, className);
      localStorage.setItem(NAME_KEY,   name);
      localStorage.setItem(STATUS_KEY, isPublic ? "ok" : "wait");
      closeModal();
      if (isPublic) { const dest = await resolveDestUrl(name); openPeji(dest); }
      else showToast("✅ 申請を送りました。管理者の承認をお待ちください。");
    } catch (err) {
      console.error("登録エラー:", err);
      showToast("エラーが発生しました。もう一度お試しください。");
    }

    submitBtn.disabled    = false;
    submitBtn.textContent = "次へ";
  });

  nameInput.addEventListener("keydown", e => { if (e.key === "Enter") submitBtn.click(); });
  cancelBtn.addEventListener("click", closeModal);
  overlay.addEventListener("click", e => { if (e.target === overlay) closeModal(); });

  window.doSearch = function() {
    const q = document.getElementById("q").value.trim();
    if (q) location.href = "https://www.google.com/search?q=" + encodeURIComponent(q);
    return false;
  };

  window.luckySearch = function() {
    const q = document.getElementById("q").value.trim();
    if (q) location.href = "https://www.google.com/search?q=" + encodeURIComponent(q) + "&btnI=1";
  };
</script>
</body>
</html>
