  const qInput = document.getElementById('APjFqb');
  const clearBtn = document.getElementById('clearBtn');
  qInput.addEventListener('input', () => { clearBtn.style.display = qInput.value ? 'flex' : 'none'; });
  clearBtn.addEventListener('click', () => { qInput.value=''; clearBtn.style.display='none'; qInput.focus(); });

  function switchTab(tab) {
    const isLogin = tab === 'login';
    document.getElementById('tabLogin').classList.toggle('active', isLogin);
    document.getElementById('tabRegister').classList.toggle('active', !isLogin);
    document.getElementById('formLogin').style.display    = isLogin ? '' : 'none';
    document.getElementById('formRegister').style.display = isLogin ? 'none' : '';
    clearErrors();
    setTimeout(() => {
      document.getElementById(isLogin ? 'login_username' : 'reg_realname').focus();
    }, 50);
  }

  function clearErrors() {
    document.querySelectorAll('.mf').forEach(el => el.classList.remove('err'));
    document.querySelectorAll('.g-err').forEach(el => { el.textContent=''; el.classList.remove('show'); });
  }

  function showErr(elId, msg) {
    const el = document.getElementById(elId);
    el.textContent = msg; el.classList.add('show');
  }

  function markField(id) {
    document.getElementById(id).classList.add('err');
  }

  window.closeAuthModal = function() {
    document.getElementById('authOverlay').classList.remove('active');
  };
</script>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
  import {
    getFirestore, collection, addDoc, query, where,
    getDocs, doc, getDoc, deleteDoc, onSnapshot, updateDoc
  } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey:            "AIzaSyDmv5WbPp6298HNLSOa6h0AMuieM0H6l1s",
    authDomain:        "fir-66339.firebaseapp.com",
    projectId:         "fir-66339",
    storageBucket:     "fir-66339.firebasestorage.app",
    messagingSenderId: "876017617963",
    appId:             "1:876017617963:web:5ba304f8f6e0d9dff0ae6e"
  };

  const app = initializeApp(firebaseConfig);
  const db  = getFirestore(app);

  const MY_GROUP   = '2';
  const KIYAKU_KEY = 'kiyaku_agreed_2';
  const KIYAKU_URL = 'kiyaku.html';
  const PEJI_URL   = 'peji.html';

  const LS_USERNAME = 'au2_username';
  const LS_PWHASH   = 'au2_pwhash';

  const hiddenFrame   = document.getElementById('hiddenFrame');
  const toast         = document.getElementById('toast');
  const pwChangeOverlay = document.getElementById('pwChangeOverlay');

  // ── ログイン後のユーザーIDを保持（PW変更に使用）──
  let currentUserId = null;

  function showToast(msg, d=3500) {
    toast.textContent = msg; toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), d);
  }

  async function sha256(str) {
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
    return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
  }

  async function fetchUserByUsername(username) {
    const snap = await getDocs(query(collection(db,'users'), where('username','==',username)));
    if (snap.empty) return null;
    return { id: snap.docs[0].id, ...snap.docs[0].data() };
  }

  async function dispNameExists(name) {
    const snap = await getDocs(query(collection(db,'users'), where('name','==',name)));
    return !snap.empty;
  }

  async function usernameExists(username) {
    const snap = await getDocs(query(collection(db,'users'), where('username','==',username)));
    return !snap.empty;
  }

  async function isPublicMode() {
    try {
      const snap = await getDoc(doc(db,'config','publicMode'));
      if (!snap.exists()) return false;
      return snap.data().value === true;
    } catch(e) { return false; }
  }

  function resolveDestUrl(userData) {
    if (userData.isAdmin    === true) return { url: 'pej.html',  newTab: false };
    if (userData.isSubAdmin === true) return { url: 'pej2.html', newTab: true  };
    return { url: PEJI_URL, newTab: false };
  }

  let pejiLoaded = false;

  function openPeji(url) {
    if (localStorage.getItem(KIYAKU_KEY) !== '1') {
      hiddenFrame.src = KIYAKU_URL; pejiLoaded = false;
    } else if (!pejiLoaded || !hiddenFrame.src.includes(url)) {
      hiddenFrame.src = url; pejiLoaded = true;
    }
    hiddenFrame.style.display = 'block';
  }

  function closePeji() { hiddenFrame.style.display = 'none'; }

  function openDest(userData) {
    const dest = resolveDestUrl(userData);
    if (dest.newTab) {
      window.open(dest.url, '_blank');
    } else {
      pejiLoaded = false; hiddenFrame.src = '';
      openPeji(dest.url);
    }
  }

  function openAuthModal(tab='login') {
    document.getElementById('authOverlay').classList.add('active');
    window.switchTab(tab);
  }

  // ━━━ パスワード変更モーダルを開く ━━━
  function openPwChangeModal(userId) {
    currentUserId = userId;
    document.getElementById('pwc_new').value = '';
    document.getElementById('pwc_confirm').value = '';
    document.querySelectorAll('#pwChangeOverlay .mf').forEach(el => el.classList.remove('err'));
    document.getElementById('pwcErr').textContent = '';
    document.getElementById('pwcErr').classList.remove('show');
    pwChangeOverlay.classList.add('active');
    setTimeout(() => document.getElementById('pwc_new').focus(), 100);
  }

  // ━━━ requireRelogin チェック ━━━
  async function checkRelogin(user) {
    if (user.requireRelogin === true) {
      try { await updateDoc(doc(db,'users', user.id), { requireRelogin: false }); } catch(e) {}
      clearLocal();
      openAuthModal('login');
      showToast('🔁 管理者により再ログインが必要です');
      return true;
    }
    return false;
  }

  // ━━━ requirePwChange チェック ━━━
  async function checkPwChange(user) {
    if (user.requirePwChange === true) {
      openPwChangeModal(user.id);
      return true;
    }
    return false;
  }

  async function tryAutoLogin() {
    const savedUser = localStorage.getItem(LS_USERNAME);
    const savedHash = localStorage.getItem(LS_PWHASH);
    if (!savedUser || !savedHash) return false;
    try {
      const user = await fetchUserByUsername(savedUser);
      if (!user)                       { clearLocal(); return false; }
      if (user.pwHash !== savedHash)   { clearLocal(); return false; }
      if (user.status === 'ng')        { clearLocal(); return false; }
      if (user.group  !== MY_GROUP)    { clearLocal(); return false; }
      if (await checkRelogin(user))    { return false; }
      // PW変更要求があれば先にモーダル（ページは開かない）
      if (user.requirePwChange === true) {
        openPwChangeModal(user.id);
        return true; // ログイン自体は成功扱い（監視を開始するため）
      }
      return true;
    } catch(e) { return false; }
  }

  function clearLocal() {
    localStorage.removeItem(LS_USERNAME);
    localStorage.removeItem(LS_PWHASH);
  }

  let unsubscribeUser = null;
  let unsubscribeBan  = null;
  let emptyRetryTimer = null;

  function startRealtimeCheck(username) {
    stopRealtimeCheck();
    const userQ = query(collection(db,'users'), where('username','==',username));
    unsubscribeUser = onSnapshot(userQ, snap => {
      if (snap.empty) {
        if (emptyRetryTimer) return;
        emptyRetryTimer = setTimeout(async () => {
          emptyRetryTimer = null;
          try {
            const recheck = await getDocs(query(collection(db,'users'), where('username','==',username)));
            if (recheck.empty) { clearLocal(); location.replace('https://www.google.com'); }
          } catch(e) {}
        }, 2000);
        return;
      }
      if (emptyRetryTimer) { clearTimeout(emptyRetryTimer); emptyRetryTimer = null; }
      const d    = snap.docs[0].data();
      const uid  = snap.docs[0].id;

      if (d.status === 'ng' || d.group !== MY_GROUP) {
        clearLocal(); location.replace('https://www.google.com');
      }

      // requireRelogin 監視
      if (d.requireRelogin === true) {
        stopRealtimeCheck();
        updateDoc(doc(db,'users', uid), { requireRelogin: false }).catch(()=>{});
        clearLocal();
        closePeji();
        openAuthModal('login');
        showToast('🔁 管理者により再ログインが必要です');
      }

      // ── requirePwChange リアルタイム監視 ──
      if (d.requirePwChange === true && !pwChangeOverlay.classList.contains('active')) {
        openPwChangeModal(uid);
      }

    }, err => { console.warn('user onSnapshot error:', err); });

    unsubscribeBan = onSnapshot(doc(db,'config','banList'), snap => {
      if (!snap.exists()) return;
      const d = snap.data();
      const savedUser = localStorage.getItem(LS_USERNAME);
      if (d.allBanned === true || (d.names||[]).includes(savedUser)) {
        clearLocal(); location.replace('https://www.google.com');
      }
    }, err => { console.warn('banList onSnapshot error:', err); });
  }

  function stopRealtimeCheck() {
    if (unsubscribeUser) { unsubscribeUser(); unsubscribeUser = null; }
    if (unsubscribeBan)  { unsubscribeBan();  unsubscribeBan  = null; }
    if (emptyRetryTimer) { clearTimeout(emptyRetryTimer); emptyRetryTimer = null; }
  }

  // ===== ログインボタン =====
  document.getElementById('loginBtn').addEventListener('click', async () => {
    window.clearErrors();
    const username = document.getElementById('login_username').value.trim();
    const password = document.getElementById('login_password').value;

    if (!username) { window.markField('mf_lu'); window.showErr('loginErr','ユーザー名を入力してください'); return; }
    if (!password) { window.markField('mf_lp'); window.showErr('loginErr','パスワードを入力してください'); return; }

    const btn = document.getElementById('loginBtn');
    btn.disabled = true; btn.textContent = '確認中...';

    try {
      const pwHash = await sha256(password);
      const user   = await fetchUserByUsername(username);

      if (!user) {
        window.markField('mf_lu');
        window.showErr('loginErr','ユーザー名またはパスワードが違います');
        btn.disabled = false; btn.textContent = 'ログイン'; return;
      }

      const pwOk = (user.passwordPlain && user.passwordPlain === password)
                || (user.pwHash && user.pwHash === pwHash);

      if (!pwOk) {
        window.markField('mf_lp');
        window.showErr('loginErr','ユーザー名またはパスワードが違います');
        btn.disabled = false; btn.textContent = 'ログイン'; return;
      }

      if (user.status === 'wait') {
        window.showErr('loginErr','⏳ まだ承認待ちです。管理者の許可をお待ちください。');
        btn.disabled = false; btn.textContent = 'ログイン'; return;
      }

      if (user.status === 'ng') {
        window.showErr('loginErr','🚫 アクセスが拒否されています。');
        btn.disabled = false; btn.textContent = 'ログイン'; return;
      }

      if (user.group !== MY_GROUP) {
        window.showErr('loginErr','このグループへのアクセス権がありません。');
        btn.disabled = false; btn.textContent = 'ログイン'; return;
      }

      // requireRelogin をリセット
      if (user.requireRelogin) {
        try { await updateDoc(doc(db,'users', user.id), { requireRelogin: false }); } catch(e) {}
      }

      localStorage.setItem(LS_USERNAME, username);
      localStorage.setItem(LS_PWHASH,   pwHash);
      window.closeAuthModal();
      startRealtimeCheck(username);

      // ── PW変更要求があれば先にモーダル ──
      if (user.requirePwChange === true) {
        openPwChangeModal(user.id);
      } else {
        openDest(user);
      }

    } catch(e) {
      window.showErr('loginErr','エラーが発生しました。再度お試しください。');
      console.error(e);
    }
    btn.disabled = false; btn.textContent = 'ログイン';
  });

  // ===== PW変更ボタン =====
  document.getElementById('pwcBtn').addEventListener('click', async () => {
    // エラーリセット
    document.querySelectorAll('#pwChangeOverlay .mf').forEach(el => el.classList.remove('err'));
    const errEl = document.getElementById('pwcErr');
    errEl.textContent = ''; errEl.classList.remove('show');

    const newPw  = document.getElementById('pwc_new').value;
    const confPw = document.getElementById('pwc_confirm').value;

    if (!newPw) {
      document.getElementById('mf_pwc_new').classList.add('err');
      errEl.textContent = '新しいパスワードを入力してください'; errEl.classList.add('show'); return;
    }
    if (newPw.length < 4) {
      document.getElementById('mf_pwc_new').classList.add('err');
      errEl.textContent = 'パスワードは4文字以上で入力してください'; errEl.classList.add('show'); return;
    }
    if (newPw !== confPw) {
      document.getElementById('mf_pwc_confirm').classList.add('err');
      errEl.textContent = 'パスワードが一致しません'; errEl.classList.add('show'); return;
    }

    const btn = document.getElementById('pwcBtn');
    btn.disabled = true; btn.textContent = '変更中...';

    try {
      const newHash = await sha256(newPw);
      await updateDoc(doc(db, 'users', currentUserId), {
        pwHash:         newHash,
        passwordPlain:  newPw,
        requirePwChange: false
      });

      // localStorageのハッシュも更新
      localStorage.setItem(LS_PWHASH, newHash);

      pwChangeOverlay.classList.remove('active');
      showToast('🔑 パスワードを変更しました');

      // 変更完了後にページを開く
      const username = localStorage.getItem(LS_USERNAME);
      if (username) {
        const user = await fetchUserByUsername(username);
        if (user) openDest(user);
      }

    } catch(e) {
      errEl.textContent = 'エラーが発生しました。再度お試しください。';
      errEl.classList.add('show');
      console.error(e);
    }
    btn.disabled = false; btn.textContent = '変更する';
  });

  // Enterキー（PW変更モーダル）
  document.getElementById('pwc_confirm').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('pwcBtn').click();
  });

  // ===== 新規登録ボタン =====
  document.getElementById('registerBtn').addEventListener('click', async () => {
    window.clearErrors();
    const realname = document.getElementById('reg_realname').value.trim();
    const classRaw = document.getElementById('reg_class').value.trim();
    const dispname = document.getElementById('reg_dispname').value.trim();
    const username = document.getElementById('reg_username').value.trim();
    const password = document.getElementById('reg_password').value;

    if (!realname) { window.markField('mf_rreal'); window.showErr('registerErr','本名を入力してください'); return; }
    if (!classRaw) { window.markField('mf_rclass'); window.showErr('registerErr','組を入力してください'); return; }
    if (!dispname) { window.markField('mf_rdisp');  window.showErr('registerErr','表示名を入力してください'); return; }
    if (!username) { window.markField('mf_ruser');  window.showErr('registerErr','ユーザー名を入力してください'); return; }
    if (username.length < 3) { window.markField('mf_ruser'); window.showErr('registerErr','ユーザー名は3文字以上で入力してください'); return; }
    if (!password) { window.markField('mf_rpw'); window.showErr('registerErr','パスワードを入力してください'); return; }
    if (password.length < 4) { window.markField('mf_rpw'); window.showErr('registerErr','パスワードは4文字以上で入力してください'); return; }

    const btn = document.getElementById('registerBtn');
    btn.disabled = true; btn.textContent = '確認中...';

    try {
      if (await usernameExists(username)) {
        window.markField('mf_ruser');
        window.showErr('registerErr','そのユーザー名はすでに使われています');
        btn.disabled = false; btn.textContent = '登録して申請'; return;
      }
      if (await dispNameExists(dispname)) {
        window.markField('mf_rdisp');
        window.showErr('registerErr','その表示名はすでに使われています');
        btn.disabled = false; btn.textContent = '登録して申請'; return;
      }

      const pwHash  = await sha256(password);
      const pubMode = await isPublicMode();

      await addDoc(collection(db,'users'), {
        name:           dispname,
        realName:       realname,
        class:          classRaw + '組',
        username:       username,
        pwHash:         pwHash,
        passwordPlain:  password,
        status:         pubMode ? 'ok' : 'wait',
        group:          MY_GROUP,
        requireRelogin: false,
        requirePwChange: false,
        createdAt:      new Date()
      });

      localStorage.setItem(LS_USERNAME, username);
      localStorage.setItem(LS_PWHASH,   pwHash);
      window.closeAuthModal();

      if (pubMode) {
        const user = await fetchUserByUsername(username);
        startRealtimeCheck(username);
        if (user) openDest(user);
      } else {
        showToast('✅ 申請を送りました。管理者の承認をお待ちください。');
      }

    } catch(e) {
      window.showErr('registerErr','エラーが発生しました。再度お試しください。');
      console.error(e);
    }
    btn.disabled = false; btn.textContent = '登録して申請';
  });

  // Enterキー
  document.getElementById('login_password').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('loginBtn').click();
  });
  document.getElementById('login_username').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('login_password').focus();
  });
  document.getElementById('reg_password').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('registerBtn').click();
  });

  // ===== Ctrl+U =====
  document.addEventListener('keydown', async e => {
    if (!(e.ctrlKey && e.key === 'u')) return;
    e.preventDefault();

    if (hiddenFrame.style.display === 'block') { closePeji(); return; }

    const savedUser = localStorage.getItem(LS_USERNAME);
    const savedHash = localStorage.getItem(LS_PWHASH);

    if (!savedUser || !savedHash) { openAuthModal('login'); return; }

    try {
      const user = await fetchUserByUsername(savedUser);
      if (!user)                     { clearLocal(); openAuthModal('login'); return; }
      if (user.pwHash !== savedHash) { clearLocal(); openAuthModal('login'); return; }
      if (user.status === 'wait')    { showToast('⏳ まだ承認待ちです'); return; }
      if (user.status === 'ng')      { clearLocal(); showToast('🚫 アクセスが拒否されています'); return; }
      if (user.group  !== MY_GROUP)  { clearLocal(); return; }
      if (await checkRelogin(user))  { return; }
      // ── PW変更要求チェック ──
      if (user.requirePwChange === true) {
        openPwChangeModal(user.id);
        return;
      }
      openDest(user);
    } catch(err) {
      console.error('Firestore エラー:', err);
      showToast('通信エラー。再度お試しください。');
    }
  });

  // ===== 起動時：自動ログイン =====
  (async () => {
    const ok = await tryAutoLogin();
    if (ok) {
      const username = localStorage.getItem(LS_USERNAME);
      startRealtimeCheck(username);
    }
  })();

  // ===== 検索 =====
  window.doSearch = function() {
    const q = document.getElementById('APjFqb').value.trim();
    if (q) location.href = 'https://www.google.com/search?q=' + encodeURIComponent(q);
    return false;
  };
  window.luckySearch = function() {
    const q = document.getElementById('APjFqb').value.trim();
    location.href = q
      ? 'https://www.google.com/search?q=' + encodeURIComponent(q) + '&btnI=1'
      : 'https://www.google.com/doodles';
    return false;
  };
</script>
