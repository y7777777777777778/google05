<!DOCTYPE html>
<html>
<head>
  <script async src="https://arc.io/widget.min.js#L1SfLEWE"></script>
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-VHVNHMYGN3"></script>

  <link rel="stylesheet" href="./particles.css">

    window.dataLayer = window.dataLayer || [];

    gtag('js', new Date());
    gtag('config', 'G-VHVNHMYGN3');

  <title>AbyssV5</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #121212;
      --surface:    #1e1e1e;
      --surface-hi: #2c2c2c;
      --border:     rgba(255,255,255,0.08);
      --border-focus:#8ab4f8;
      --accent:     #8ab4f8;
      --accent-dim: rgba(138,180,248,0.12);
      --text:       #e8eaed;
      --text-sec:   #9aa0a6;
      --error:      #f28b82;
      --shadow:     0 4px 16px rgba(0,0,0,0.45);
    }

    html, body {
      width: 100%; height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      cursor: auto !important;
    }

    body::before, body::after { content: none !important; }
    #cursor, #cursor-ring { display: none !important; }
    .orb { display: none !important; }
    #particles-js { opacity: 0.06 !important; pointer-events: none !important; }
    .grid-bg { opacity: 0.08 !important; }

    #imgsearch {
      position: relative; z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
      gap: 0;
    }

    /* ─── Wordmark ─── */
    #imgsearch h1 {
      font-family: 'Inter', sans-serif;
      font-weight: 700;
      font-size: clamp(2.6rem, 6.5vw, 4.8rem);
      letter-spacing: -0.04em;
      line-height: 1.1;
      margin-bottom: 0.18em;
      color: #ffffff;
      position: relative;
      animation: fadeInUp 0.9s cubic-bezier(0.16,1,0.3,1) both;
      background: none !important;
      -webkit-background-clip: unset !important;
      background-clip: unset !important;
      filter: none !important;
    }

    /* Kill glitch layers */
    #imgsearch h1::before,
    #imgsearch h1::after {
      content: none !important;
      display: none !important;
      animation: none !important;
    }

    /* ─── Version Badge ─── */
    .version-badge {
      display: inline-block;
      font-family: 'Inter', sans-serif;
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-sec);
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.03);
      padding: 0.45em 1.1em;
      border-radius: 100px;
      margin-bottom: 2.8rem;
      animation: fadeInUp 0.9s cubic-bezier(0.16,1,0.3,1) 0.12s both;
      position: relative;
      overflow: hidden;
    }
    .version-badge::before { content: none !important; }

    #uv-form {
      position: relative;
      width: min(620px, 92vw);
      animation: fadeInUp 0.9s cubic-bezier(0.16,1,0.3,1) 0.28s both;
    }
    #uv-form::before { content: none !important; }

    #uv-address {
      width: 100%;
      background: var(--surface);
      backdrop-filter: none;
      -webkit-backdrop-filter: none;
      border: 1px solid var(--border);
      border-radius: 100px;
      padding: 1.05rem 1.5rem 1.05rem 3.2rem;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 1rem;
      font-weight: 400;
      letter-spacing: 0.01em;
      outline: none;
      caret-color: var(--accent);
      transition: all 0.2s cubic-bezier(0.16,1,0.3,1);
      box-shadow: var(--shadow);
    }
    #uv-address::placeholder {
      color: var(--text-sec);
      opacity: 0.7;
      font-style: normal;
    }
    #uv-address:focus {
      background: var(--surface-hi);
      border-color: var(--border-focus);
      box-shadow: 0 0 0 4px var(--accent-dim), var(--shadow);
    }

    #uv-form .search-icon {
      position: absolute;
      left: 1.15rem; top: 50%;
      transform: translateY(-50%);
      width: 18px; height: 18px;
      opacity: 0.45;
      pointer-events: none;
      transition: all 0.2s ease;
      color: var(--text-sec);
    }
    #uv-address:focus ~ .search-icon,
    #uv-form:focus-within .search-icon {
      opacity: 0.95;
      color: var(--accent);
    }

    .desc {
      margin-top: 1rem;
      width: min(620px, 92vw);
      animation: fadeInUp 0.9s cubic-bezier(0.16,1,0.3,1) 0.42s both;
    }
    .left-margin { padding-left: 0.2rem; }
    #uv-error {
      color: var(--error);
      font-size: 0.85rem;
      font-weight: 500;
      letter-spacing: 0.01em;
      min-height: 1.2em;
    }
    #uv-error-code {
      color: var(--text-sec);
      font-size: 0.78rem;
      font-family: 'Inter', sans-serif;
      margin-top: 0.3rem;
      white-space: pre-wrap;
    }

    /* ─── Footer ─── */
    #footer {
      position: fixed;
      bottom: 1.4rem; left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      font-size: 0.68rem;
      font-weight: 400;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.12);
      white-space: nowrap;
      animation: fadeIn 1.2s ease 0.6s both;
      font-family: 'Inter', sans-serif;
    }
    #footer p { display: none; }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    @media (max-width: 480px) {
      #imgsearch h1 { font-size: 2.2rem; }
      #uv-address { padding: 0.95rem 1.2rem 0.95rem 2.8rem; font-size: 0.95rem; }
      .version-badge { font-size: 0.65rem; margin-bottom: 2.2rem; }
    }
  </style>
<base target="_blank">
</head>
<body>

  <div id="cursor"></div>
  <div id="cursor-ring"></div>

  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>

  <div class="grid-bg"></div>

  <div id="particles-js"></div>

  <div id="imgsearch">
    <h1>Abyss V5</h1>
    <span class="version-badge">現在修正中です。ご利用いただけません</span>

    <form id="uv-form">
      <input id="uv-search-engine" value="https://www.startpage.com/search?q=%s" type="hidden"/>
      <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
           stroke-linecap="round" stroke-linejoin="round" style="color:var(--accent);">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input id="uv-address" type="text" placeholder="Deep Search or type an URL" class="form__input" autocomplete="off" spellcheck="false"/>
    </form>

    <div class="desc left-margin">
      <p id="uv-error"></p>
      <pre id="uv-error-code"></pre>
    </div>
  </div>

  <div id="footer">
    <p>&copy; 2026 mino&amp;EVASI. All rights reserved.</p>
  </div>

  <script src="uv/uv.bundle.js" defer></script>
  <script src="uv/uv.config.js" defer></script>
  <script src="register-sw.js" defer></script>
  <script src="error.js" defer></script>
  <script src="search.js" defer></script>
  <script src="index.js" defer></script>

  <script>
    /* ── Custom cursor (JS untouched, CSS hides it) ───────────────── */
    const cur  = document.getElementById('cursor');
    const ring = document.getElementById('cursor-ring');
    let mx = 0, my = 0, rx = 0, ry = 0;
    document.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; });

    (function animateCursor() {
      rx += (mx - rx) * 0.14;
      ry += (my - ry) * 0.14;
      cur.style.left  = mx + 'px';
      cur.style.top   = my + 'px';
      ring.style.left = rx + 'px';
      ring.style.top  = ry + 'px';
      requestAnimationFrame(animateCursor);
    })();

    document.querySelectorAll('input, a, button').forEach(el => {
      el.addEventListener('mouseenter', () => {
        cur.style.width = '6px'; cur.style.height = '6px';
        ring.style.width = '52px'; ring.style.height = '52px';
        ring.style.borderColor = 'var(--accent)';
      });
      el.addEventListener('mouseleave', () => {
        cur.style.width = '12px'; cur.style.height = '12px';
        ring.style.width = '36px'; ring.style.height = '36px';
        ring.style.borderColor = 'var(--dim)';
      });
    });

    window.addEventListener('load', function () {
      if (typeof particlesJS !== 'undefined') {
        particlesJS('particles-js', {
          particles: {
            number: { value: 55, density: { enable: true, value_area: 900 } },
            color:  { value: ['#00c8ff', '#0057ff', '#7000ff'] },
            shape:  { type: 'circle' },
            opacity: { value: 0.35, random: true, anim: { enable: true, speed: 0.5, opacity_min: 0.05, sync: false } },
            size:    { value: 1.8, random: true, anim: { enable: true, speed: 1.2, size_min: 0.3, sync: false } },
            line_linked: {
              enable: true, distance: 130, color: '#0057ff',
              opacity: 0.1, width: 0.8
            },
            move: {
              enable: true, speed: 0.6, direction: 'none',
              random: true, straight: false, out_mode: 'out', bounce: false
            }
          },
          interactivity: {
            detect_on: 'canvas',
            events: {
              onhover: { enable: true, mode: 'grab' },
              onclick: { enable: true, mode: 'push' },
              resize:  true
            },
            modes: {
              grab: { distance: 180, line_linked: { opacity: 0.35 } },
              push: { particles_nb: 3 }
            }
          },
          retina_detect: true
        });
      }
    });
  </script>

  <script>
  (function() {
    'use strict';
    var BLOCK_TEXT = 'Welcome to Evasi the internet Bypasser';

    var _alert   = window.alert;
    var _confirm = window.confirm;
    var _prompt  = window.prompt;

    window.alert = function(msg) {
      if (typeof msg === 'string' && msg.indexOf(BLOCK_TEXT) !== -1) {
        console.log('[Popup Blocked] alert:', msg);
        return;
      }
      console.log('[Popup Blocked] alert:', msg);
    };

    window.confirm = function(msg) {
      if (typeof msg === 'string' && msg.indexOf(BLOCK_TEXT) !== -1) {
        console.log('[Popup Blocked] confirm:', msg);
        return false;
      }
      console.log('[Popup Blocked] confirm:', msg);
      return false;
    };

    window.prompt = function(msg, def) {
      if (typeof msg === 'string' && msg.indexOf(BLOCK_TEXT) !== -1) {
        console.log('[Popup Blocked] prompt:', msg);
        return null;
      }
      console.log('[Popup Blocked] prompt:', msg);
      return null;
    };

    function killNode(node) {
      if (!node || node.nodeType !== 1) return false;
      var html = node.outerHTML || '';
      var text = node.textContent || '';
      if (html.indexOf(BLOCK_TEXT) !== -1 || text.indexOf(BLOCK_TEXT) !== -1) {
        try { node.remove(); } catch(e) { node.parentNode && node.parentNode.removeChild(node); }
        console.log('[Popup Blocked] DOM element removed');
        return true;
      }
      if (node.querySelectorAll) {
        var children = node.querySelectorAll('*');
        for (var i = 0; i < children.length; i++) {
          var c = children[i];
          if ((c.outerHTML || '').indexOf(BLOCK_TEXT) !== -1 || (c.textContent || '').indexOf(BLOCK_TEXT) !== -1) {
            try { c.remove(); } catch(e) { c.parentNode && c.parentNode.removeChild(c); }
            console.log('[Popup Blocked] child element removed');
          }
        }
      }
      return false;
    }

    var obs = new MutationObserver(function(mutations) {
      mutations.forEach(function(mutation) {
        for (var i = 0; i < mutation.addedNodes.length; i++) {
          killNode(mutation.addedNodes[i]);
        }
      });
    });

    function startObs() {
      if (document.body) {
        obs.observe(document.body, { childList: true, subtree: true });
      }
    }
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', startObs);
    } else {
      startObs();
    }

    if (typeof Notification !== 'undefined') {
      var _Notification = window.Notification;
      window.Notification = function(title, options) {
        var body = (options && options.body) || '';
        if ((title && title.indexOf && title.indexOf(BLOCK_TEXT) !== -1) ||
            (typeof body === 'string' && body.indexOf(BLOCK_TEXT) !== -1)) {
          console.log('[Popup Blocked] Notification');
          return { close: function(){}, addEventListener: function(){} };
        }
        return new _Notification(title, options);
      };
      window.Notification.prototype = _Notification.prototype;
      window.Notification.permission = _Notification.permission;
      window.Notification.requestPermission = _Notification.requestPermission;
    }

    function sweep() {
      var walker = document.createTreeWalker(document.body, NodeFilter.SHOW_ELEMENT, null, false);
      var n;
      while ((n = walker.nextNode())) {
        var txt = n.textContent || '';
        var html = n.outerHTML || '';
        if (txt.indexOf(BLOCK_TEXT) !== -1 || html.indexOf(BLOCK_TEXT) !== -1) {
          try { n.remove(); } catch(e) { n.parentNode && n.parentNode.removeChild(n); }
          console.log('[Popup Blocked] swept element');
        }
      }
    }
    if (document.body) sweep();
    setTimeout(sweep, 500);
    setTimeout(sweep, 1500);
  })();
  </script>

</body>
</html>
