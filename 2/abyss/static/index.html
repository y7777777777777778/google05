<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AbyssV5 - browser</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-app: #202124;
            --bg-toolbar: #35363a;
            --bg-tab-active: #35363a;
            --bg-tab-hover: #2d2e31;
            --text-primary: #e8eaed;
            --text-secondary: #9aa0a6;
            --accent: #8ab4f8;
            --border: rgba(255, 255, 255, 0.1);
            --danger: #f28b82;
            --shadow: 0 4px 12px rgba(0,0,0,0.4);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body { 
            font-family: 'Roboto', -apple-system, BlinkMacSystemFont, sans-serif; 
            background: var(--bg-app); 
            color: var(--text-primary); 
            height: 100vh; 
            overflow: hidden; 
            display: flex; 
            flex-direction: column;
            user-select: none;
        }

        /* ========== TAB BAR ========== */
        .tab-bar { 
            display: flex; 
            background: var(--bg-app); 
            padding: 8px 8px 0 8px; 
            gap: 2px; 
            align-items: flex-end; 
            overflow-x: auto;
            overflow-y: hidden;
        }
        .tab-bar::-webkit-scrollbar { display: none; }

        .tab {
            min-width: 140px; 
            max-width: 240px; 
            height: 34px; 
            background: transparent; 
            border-radius: 8px 8px 0 0; 
            padding: 0 10px 0 12px; 
            display: flex; 
            align-items: center; 
            gap: 8px; 
            cursor: pointer;
            font-size: 13px; 
            color: var(--text-secondary); 
            transition: background 0.2s;
            position: relative;
            flex-shrink: 0;
            flex: 1;
        }

        .tab:not(.active):not(:hover)::after {
            content: ''; position: absolute; right: -1px; top: 25%; height: 50%; width: 1px;
            background: var(--border);
        }

        .tab.active { background: var(--bg-tab-active); color: var(--text-primary); }
        .tab:hover:not(.active) { background: var(--bg-tab-hover); }

        .tab.dragging { opacity: 0.5; }
        .tab.drop-target { border: 1px dashed var(--accent); }

        .tab-favicon { width: 16px; height: 16px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .tab-favicon img { width: 100%; height: 100%; border-radius: 2px; }

        .tab-title { flex: 1; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; font-weight: 400; }

        /* Loading Spinner */
        @keyframes spin { 100% { transform: rotate(360deg); } }
        .tab-loading {
            width: 14px; height: 14px;
            border: 2px solid var(--text-secondary);
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            display: none;
            flex-shrink: 0;
        }
        .tab.loading .tab-favicon { display: none; }
        .tab.loading .tab-loading { display: block; }

        .tab-close { 
            width: 24px; height: 24px; 
            display: flex; align-items: center; justify-content: center; 
            border-radius: 50%; 
            transition: all 0.2s; 
            flex-shrink: 0;
            opacity: 0;
            color: var(--text-secondary);
        }
        .tab:hover .tab-close, .tab.active .tab-close { opacity: 1; }
        .tab-close:hover { background: rgba(255,255,255,0.1); color: var(--text-primary); }

        .new-tab-btn { 
            width: 32px; height: 32px; 
            display: flex; align-items: center; justify-content: center; 
            cursor: pointer; 
            color: var(--text-secondary); 
            border-radius: 50%;
            transition: background 0.2s;
            flex-shrink: 0;
            margin-left: 4px;
            margin-bottom: 2px;
        }
        .new-tab-btn:hover { background: var(--bg-tab-hover); color: var(--text-primary); }
        .new-tab-btn svg { width: 20px; height: 20px; fill: currentColor; }

        .toolbar { 
            background: var(--bg-toolbar); 
            padding: 6px 12px; 
            display: flex; 
            align-items: center; 
            gap: 12px; 
        }

        .nav-btn { 
            background: none; border: none; color: var(--text-secondary); 
            cursor: pointer; transition: background 0.2s; 
            width: 32px; height: 32px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
        }
        .nav-btn:hover:not(:disabled) { background: rgba(255,255,255,0.1); color: var(--text-primary); }
        .nav-btn:disabled { opacity: 0.3; cursor: default; }
        .nav-btn svg { width: 20px; height: 20px; fill: currentColor; }

        .address-bar-container {
            flex: 1; 
            background: var(--bg-app); 
            border: 1px solid transparent; 
            border-radius: 100px;
            height: 32px; 
            display: flex; 
            align-items: center; 
            padding: 0 16px; 
            transition: all 0.2s;
            gap: 10px;
        }
        .address-bar-container:focus-within { 
            border-color: rgba(138, 180, 248, 0.4); 
            box-shadow: 0 0 0 2px rgba(138, 180, 248, 0.1);
        }

        .address-icon { display: flex; align-items: center; color: var(--text-secondary); }
        .address-icon svg { width: 16px; height: 16px; fill: currentColor; }

        #main-address-bar {
            flex: 1; background: none; border: none; color: var(--text-primary); 
            outline: none; font-size: 14px; font-family: 'Roboto', sans-serif;
        }
        #main-address-bar::placeholder { color: var(--text-secondary); }

        /* ========== PROGRESS BAR ========== */
        .progress-container {
            height: 2px;
            background: var(--bg-toolbar);
            position: relative;
            overflow: hidden;
            width: 100%;
        }
        .progress-bar {
            position: absolute;
            top: 0; left: 0; height: 100%;
            background: var(--accent);
            width: 0%;
            transition: width 0.2s ease, opacity 0.3s;
            opacity: 0;
        }
        .progress-bar.loading { opacity: 1; }

        /* ========== VIEWPORT ========== */
        .viewport { 
            flex: 1; position: relative; background: var(--bg-app); 
        }
        iframe { 
            width: 100%; height: 100%; border: none; 
            position: absolute; inset: 0; 
            opacity: 0; pointer-events: none; transition: opacity 0.2s;
        }
        iframe.active { opacity: 1; pointer-events: auto; }

        .context-menu {
            position: fixed; background: #28292c; border: 1px solid var(--border);
            border-radius: 8px; padding: 8px 0; z-index: 10000;
            box-shadow: var(--shadow); display: none; min-width: 220px;
        }
        .context-menu.visible { display: block; }
        .context-item {
            padding: 10px 16px; cursor: pointer; font-size: 13px;
            color: var(--text-primary); display: flex; align-items: center; gap: 12px;
        }
        .context-item:hover { background: var(--bg-tab-hover); }
        .context-divider { height: 1px; background: var(--border); margin: 6px 0; }

        .tab-tooltip {
            position: fixed; background: #28292c; border: 1px solid var(--border);
            border-radius: 4px; padding: 6px 10px; font-size: 12px; color: var(--text-primary);
            z-index: 9999; pointer-events: none; opacity: 0; transition: opacity 0.2s;
            box-shadow: 0 2px 8px rgba(0,0,0,0.4); max-width: 300px;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .tab-tooltip.visible { opacity: 1; }
    </style>
</head>
<body>
    <div class="tab-bar" id="tab-bar">
        <div class="new-tab-btn" onclick="createNewTab()" title="新しいタブ">
            <svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
        </div>
    </div>

    <div class="toolbar">
        <button class="nav-btn" id="btn-back" onclick="activeIframeAction('back')" title="戻る">
            <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
        </button>
        <button class="nav-btn" id="btn-forward" onclick="activeIframeAction('forward')" title="進む">
            <svg viewBox="0 0 24 24"><path d="M12 4l-1.41 1.41L16.17 11H4v2h12.17l-5.58 5.59L12 20l8-8z"/></svg>
        </button>
        <button class="nav-btn" id="btn-reload" onclick="activeIframeAction('reload')" title="更新">
            <svg viewBox="0 0 24 24"><path d="M17.65 6.35C16.24 4.94 14.24 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
        </button>
        <div class="address-bar-container">
            <div class="address-icon" title="プライベート接続">
                <svg viewBox="0 0 24 24"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zM9 6c0-1.66 1.34-3 3-3s3 1.34 3 3v2H9V6zm9 14H6V10h12v10zm-6-3c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2z"/></svg>
            </div>
            <input type="text" id="main-address-bar" placeholder="検索または URL を入力" autocomplete="off">
        </div>
    </div>

    <div class="progress-container">
        <div class="progress-bar" id="progress-bar"></div>
    </div>

    <div class="viewport" id="viewport"></div>

    <div class="context-menu" id="context-menu">
        <div class="context-item" onclick="contextAction('reload')">再読み込み</div>
        <div class="context-item" onclick="contextAction('duplicate')">タブを複製</div>
        <div class="context-divider"></div>
        <div class="context-item" onclick="contextAction('close')">タブを閉じる</div>
        <div class="context-item" onclick="contextAction('closeOthers')">他のタブを閉じる</div>
        <div class="context-item" onclick="contextAction('closeRight')">右側のタブを閉じる</div>
    </div>

    <div class="tab-tooltip" id="tab-tooltip"></div>

    <script src="uv/uv.bundle.js"></script>
    <script src="uv/uv.config.js"></script>
    <script>
        let tabs = [];
        let activeTabId = null;
        let contextTabId = null;
        let dragSrcEl = null;

        const defaultIcon = `<svg viewBox="0 0 24 24" style="fill:currentColor;"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg>`;

        function showProgress() {
            const bar = document.getElementById('progress-bar');
            bar.classList.add('loading');
            bar.style.width = '10%';
            
            if (window.progressInterval) clearInterval(window.progressInterval);
            let progress = 10;
            window.progressInterval = setInterval(() => {
                progress += (90 - progress) * 0.1;
                bar.style.width = progress + '%';
            }, 200);
        }

        function hideProgress() {
            const bar = document.getElementById('progress-bar');
            if (window.progressInterval) clearInterval(window.progressInterval);
            bar.style.width = '100%';
            setTimeout(() => {
                bar.classList.remove('loading');
                setTimeout(() => { bar.style.width = '0%'; }, 200);
            }, 300);
        }

        function createNewTab(url = 'search.html') {
            const id = 'tab-' + Date.now() + '-' + Math.random().toString(36).substr(2, 5);
            const tabObj = { id, url, loading: true, proxyReloaded: false };
            tabs.push(tabObj);

            const tabEl = document.createElement('div');
            tabEl.className = 'tab loading';
            tabEl.id = 'trigger-' + id;
            tabEl.draggable = true;
            tabEl.dataset.tabId = id;

            tabEl.innerHTML = `
                <span class="tab-favicon">${defaultIcon}</span>
                <span class="tab-loading"></span>
                <span class="tab-title">新しいタブ</span>
                <span class="tab-close" onclick="closeTab(event, '${id}')">
                    <svg viewBox="0 0 24 24" style="width:16px;height:16px;fill:currentColor;"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
                </span>
            `;

            tabEl.addEventListener('click', () => switchTab(id));
            tabEl.addEventListener('contextmenu', (e) => showContextMenu(e, id));
            tabEl.addEventListener('mouseenter', (e) => showTooltip(e, id));
            tabEl.addEventListener('mouseleave', hideTooltip);

            tabEl.addEventListener('dragstart', handleDragStart);
            tabEl.addEventListener('dragover', handleDragOver);
            tabEl.addEventListener('drop', handleDrop);
            tabEl.addEventListener('dragend', handleDragEnd);

            const newTabBtn = document.querySelector('.new-tab-btn');
            document.getElementById('tab-bar').insertBefore(tabEl, newTabBtn);

            const iframe = document.createElement('iframe');
            iframe.id = id;
            iframe.src = url;
            
            iframe.onload = () => {
                tabObj.loading = false;
                tabEl.classList.remove('loading');
                hideProgress();
                updateTabMetadata(id);
                updateNavButtons();

                try {
                    const currentUrl = iframe.contentWindow.location.href;
                    if (currentUrl.includes(__uv$config.prefix) && !tabObj.proxyReloaded) {
                        tabObj.proxyReloaded = true; 
                        setTimeout(() => {
                            iframe.contentWindow.location.reload();
                        }, 10); 
                    }
                } catch(e) {
                }
            };
            
            document.getElementById('viewport').appendChild(iframe);

            switchTab(id);
            showProgress();
        }

        function switchTab(id) {
            if (!tabs.find(t => t.id === id)) return;
            activeTabId = id;

            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('iframe').forEach(f => f.classList.remove('active'));

            const trigger = document.getElementById('trigger-' + id);
            const iframe = document.getElementById(id);
            if (trigger) trigger.classList.add('active');
            if (iframe) iframe.classList.add('active');

            updateAddressBar();
            updateNavButtons();
        }

        function closeTab(e, id) {
            if (e) e.stopPropagation();
            const tabObj = tabs.find(t => t.id === id);
            if (!tabObj) return;
            if (tabs.length === 1) {
                createNewTab();
                closeTab(null, id);
                return;
            }

            const index = tabs.findIndex(t => t.id === id);
            tabs.splice(index, 1);

            const trigger = document.getElementById('trigger-' + id);
            const iframe = document.getElementById(id);
            if (trigger) trigger.remove();
            if (iframe) iframe.remove();

            if (activeTabId === id) {
                const newIndex = Math.min(index, tabs.length - 1);
                if (tabs[newIndex]) switchTab(tabs[newIndex].id);
            }
            updateNavButtons();
            hideTooltip();
        }

        function updateTabMetadata(id) {
            const iframe = document.getElementById(id);
            const tab = document.getElementById('trigger-' + id);
            if (!iframe || !tab) return;

            try {
                const title = iframe.contentDocument.title || "新しいタブ";
                tab.querySelector('.tab-title').textContent = title;

                const faviconLink = iframe.contentDocument.querySelector('link[rel*="icon"]');
                if (faviconLink) {
                    tab.querySelector('.tab-favicon').innerHTML = `<img src="${faviconLink.href}" onerror="this.innerHTML='${defaultIcon}'">`;
                }
            } catch(e) {
                tab.querySelector('.tab-title').textContent = "プライベート接続";
            }
        }

        function updateAddressBar() {
            const frame = document.getElementById(activeTabId);
            if (!frame) return;
            try {
                const currentUrl = frame.contentWindow.location.href;
                const bar = document.getElementById('main-address-bar');
                if (currentUrl.includes('search.html')) {
                    bar.value = '';
                } else {
                    bar.value = currentUrl;
                }
            } catch(e) { 
                document.getElementById('main-address-bar').value = "Protected Session";
            }
        }

        function updateNavButtons() {
            const frame = document.getElementById(activeTabId);
            const canGoBack = frame && frame.contentWindow && frame.contentWindow.history.length > 1;
            document.getElementById('btn-back').disabled = !canGoBack;
        }

        function handleDragStart(e) {
            dragSrcEl = this;
            this.classList.add('dragging');
            e.dataTransfer.effectAllowed = 'move';
            e.dataTransfer.setData('text/plain', this.dataset.tabId);
        }

        function handleDragOver(e) {
            e.preventDefault();
            e.dataTransfer.dropEffect = 'move';
            const target = e.target.closest('.tab');
            if (target && target !== dragSrcEl) target.classList.add('drop-target');
        }

        function handleDrop(e) {
            e.stopPropagation();
            const target = e.target.closest('.tab');
            if (dragSrcEl && target && dragSrcEl !== target) {
                const srcId = dragSrcEl.dataset.tabId;
                const targetId = target.dataset.tabId;
                const srcIdx = tabs.findIndex(t => t.id === srcId);
                const targetIdx = tabs.findIndex(t => t.id === targetId);

                if (srcIdx > -1 && targetIdx > -1) {
                    const [moved] = tabs.splice(srcIdx, 1);
                    tabs.splice(targetIdx, 0, moved);
                    
                    const bar = document.getElementById('tab-bar');
                    const newTabBtn = document.querySelector('.new-tab-btn');
                    tabs.forEach(t => {
                        const el = document.getElementById('trigger-' + t.id);
                        if (el) bar.insertBefore(el, newTabBtn);
                    });
                }
            }
            return false;
        }

        function handleDragEnd() {
            this.classList.remove('dragging');
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('drop-target'));
            dragSrcEl = null;
        }

        function showContextMenu(e, id) {
            e.preventDefault();
            contextTabId = id;
            const menu = document.getElementById('context-menu');
            
            menu.style.left = Math.min(e.clientX, window.innerWidth - 220) + 'px';
            menu.style.top = Math.min(e.clientY, window.innerHeight - 200) + 'px';
            menu.classList.add('visible');
        }

        function contextAction(action) {
            const menu = document.getElementById('context-menu');
            menu.classList.remove('visible');
            if (!contextTabId) return;

            switch(action) {
                case 'reload':
                    const frame = document.getElementById(contextTabId);
                    if (frame) frame.contentWindow.location.reload();
                    break;
                case 'duplicate':
                    const tabObj = tabs.find(t => t.id === contextTabId);
                    if (tabObj) createNewTab(tabObj.url);
                    break;
                case 'close':
                    closeTab(null, contextTabId);
                    break;
                case 'closeOthers':
                    tabs.filter(t => t.id !== contextTabId).forEach(t => closeTab(null, t.id));
                    break;
                case 'closeRight':
                    const idx = tabs.findIndex(t => t.id === contextTabId);
                    tabs.slice(idx + 1).forEach(t => closeTab(null, t.id));
                    break;
            }
            contextTabId = null;
        }

        document.addEventListener('click', () => {
            document.getElementById('context-menu').classList.remove('visible');
        });

        // ==================== TOOLTIP ====================
        function showTooltip(e, id) {
            const tabEl = document.getElementById('trigger-' + id);
            if (!tabEl) return;

            const tooltip = document.getElementById('tab-tooltip');
            tooltip.textContent = tabEl.querySelector('.tab-title').textContent;

            const rect = tabEl.getBoundingClientRect();
            tooltip.style.left = rect.left + 'px';
            tooltip.style.top = (rect.bottom + 8) + 'px';
            tooltip.classList.add('visible');
        }

        function hideTooltip() { document.getElementById('tab-tooltip').classList.remove('visible'); }

        function activeIframeAction(action) {
            const frame = document.getElementById(activeTabId);
            if (!frame) return;
            try {
                if (action === 'back') frame.contentWindow.history.back();
                if (action === 'forward') frame.contentWindow.history.forward();
                if (action === 'reload') frame.contentWindow.location.reload();
            } catch(e) {}
        }

        document.getElementById('main-address-bar').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                const val = e.target.value.trim();
                if (!val) return;
                
                const frame = document.getElementById(activeTabId);
                const tabEl = document.getElementById('trigger-' + activeTabId);
                if (!frame || !tabEl) return;

                tabEl.classList.add('loading');
                showProgress();

                if (frame.contentWindow.processSearch) {
                    frame.contentWindow.processSearch(val);
                } else {
                    let searchUrl = val;
                    if (!val.includes('.') || val.includes(' ')) {
                        searchUrl = 'https://www.startpage.com/search?q=' + encodeURIComponent(val);
                    } else if (!val.startsWith('http')) {
                        searchUrl = 'https://' + val;
                    }
                    frame.src = __uv$config.prefix + __uv$config.encodeUrl(searchUrl);
                }
            }
        });

        document.addEventListener('keydown', (e) => {
            if (e.ctrlKey || e.metaKey) {
                if (e.key === 't') { e.preventDefault(); createNewTab(); }
                if (e.key === 'w') { e.preventDefault(); closeTab(null, activeTabId); }
            }
        });

        window.onload = () => {
            createNewTab();
        };
    </script>
</body>
</html>
