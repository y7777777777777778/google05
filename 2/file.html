<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>ファイルポータル</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Figtree:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#000;--bg2:#1C1C1E;--bg3:#2C2C2E;
  --sep:rgba(84,84,88,.65);--sep2:rgba(84,84,88,.35);
  --fill:rgba(120,120,128,.2);--fill2:rgba(120,120,128,.16);--fill3:rgba(120,120,128,.1);
  --t1:#fff;--t2:rgba(235,235,245,.6);--t3:rgba(235,235,245,.3);--t4:rgba(235,235,245,.16);
  --blue:#0A84FF;--blue-l:#409CFF;--green:#30D158;--red:#FF453A;
  --glass:rgba(26,26,28,.97);--blur:blur(32px) saturate(180%);
  --r1:8px;--r2:12px;--r3:16px;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;min-height:100%;font-family:'Figtree',sans-serif;background:var(--bg);color:var(--t1);}
.wall{
  position:fixed;inset:0;z-index:0;pointer-events:none;
  background:
    radial-gradient(circle at 10% 0%,#153060 0%,transparent 35%),
    radial-gradient(circle at 90% 20%,#111f48 0%,transparent 40%),
    radial-gradient(circle at 70% 80%,#21092f 0%,transparent 40%),
    #02040b;
}
#app{position:relative;z-index:10;min-height:100vh;display:flex;flex-direction:column;}
#topBar{
  height:44px;flex-shrink:0;display:flex;align-items:center;gap:10px;padding:0 16px;
  background:var(--glass);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);
  border-bottom:.5px solid var(--sep);position:sticky;top:0;z-index:100;
}
.logo-icon{width:28px;height:28px;border-radius:7px;background:#185FA5;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
#topBar h1{font-size:14px;font-weight:700;}
.top-sub{font-size:11px;color:var(--t3);margin-left:auto;}
#main{flex:1;max-width:720px;margin:0 auto;width:100%;padding:24px 16px 48px;}
#dropZone{
  border:1.5px dashed var(--sep);border-radius:var(--r3);padding:40px 20px;
  text-align:center;cursor:pointer;transition:background .15s,border-color .15s;
  background:var(--fill3);position:relative;margin-bottom:24px;
}
#dropZone.dragover{background:rgba(10,132,255,.08);border-color:var(--blue);}
#dropZone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
.dz-icon{font-size:36px;margin-bottom:10px;display:block;}
#dropZone p{font-size:15px;font-weight:600;color:var(--t1);margin-bottom:4px;}
#dropZone small{font-size:12px;color:var(--t3);}
.browse-btn{display:inline-block;margin-top:12px;padding:7px 18px;border:.5px solid var(--sep2);border-radius:var(--r1);font-size:12px;font-weight:600;color:var(--t2);background:var(--fill2);cursor:pointer;}
.browse-btn:hover{background:var(--fill);}
.sec-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.sec-hd h2{font-size:11px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.06em;}
.file-count{font-size:11px;color:var(--t4);background:var(--fill2);padding:2px 8px;border-radius:99px;border:.5px solid var(--sep2);}
#fileList{display:flex;flex-direction:column;gap:6px;}
.file-item{background:var(--bg2);border:.5px solid var(--sep2);border-radius:var(--r2);padding:10px 14px;display:flex;align-items:center;gap:12px;transition:background .12s;}
.file-item:hover{background:var(--bg3);}
.file-icon{width:38px;height:38px;border-radius:var(--r1);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.fi-vid{background:rgba(90,200,250,.12);}
.fi-pdf{background:rgba(255,69,58,.12);}
.fi-img{background:rgba(10,132,255,.12);}
.fi-doc{background:rgba(48,209,88,.12);}
.fi-zip{background:rgba(255,214,10,.1);}
.fi-other{background:var(--fill3);}
.file-info{flex:1;min-width:0;}
.file-name{font-size:13px;font-weight:600;color:var(--t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.file-meta{font-size:11px;color:var(--t3);margin-top:2px;}
.file-actions{display:flex;align-items:center;gap:6px;flex-shrink:0;}
.prog-wrap{width:80px;height:4px;background:var(--fill2);border-radius:2px;overflow:hidden;}
.prog-fill{height:100%;background:var(--blue);border-radius:2px;transition:width .2s;}
.status-pill{font-size:10px;font-weight:700;padding:2px 8px;border-radius:99px;white-space:nowrap;}
.s-done{background:rgba(48,209,88,.15);color:var(--green);}
.s-uploading{background:rgba(10,132,255,.15);color:var(--blue-l);}
.s-error{background:rgba(255,69,58,.15);color:var(--red);}
.icon-btn{width:30px;height:30px;border-radius:var(--r1);border:.5px solid var(--sep2);background:transparent;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--t3);transition:background .1s,color .1s;text-decoration:none;}
.icon-btn:hover{background:var(--fill);color:var(--t1);}
.icon-btn svg{width:14px;height:14px;}
#footerBar{margin-top:20px;padding-top:14px;border-top:.5px solid var(--sep2);display:flex;align-items:center;justify-content:space-between;}
.storage-label{font-size:12px;color:var(--t3);margin-bottom:5px;}
.storage-track{width:140px;height:3px;background:var(--fill2);border-radius:2px;}
.storage-fill-bar{height:100%;background:var(--blue);border-radius:2px;}
.upload-btn{height:34px;padding:0 18px;background:var(--blue);color:#fff;border:none;border-radius:var(--r1);font-size:12px;font-weight:700;font-family:'Figtree',sans-serif;cursor:pointer;display:flex;align-items:center;gap:6px;transition:background .12s;}
.upload-btn:hover{background:#1a8fff;}
.upload-btn svg{width:14px;height:14px;}
.empty-state{text-align:center;padding:32px;color:var(--t4);font-size:13px;}
.speed-txt{font-size:10px;color:var(--t4);margin-top:3px;}
</style>
</head>
<body>
<div class="wall"></div>
<div id="app">
  <div id="topBar">
    <div class="logo-icon">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
      </svg>
    </div>
    <h1>ファイルポータル</h1>
    <span class="top-sub" id="statusText">準備完了</span>
  </div>

  <div id="main">
    <div id="dropZone">
      <input type="file" id="fileInput" multiple accept="video/*,image/*,application/pdf,.zip,.doc,.docx,.txt">
      <span class="dz-icon">☁️</span>
      <p>ファイルをここにドラッグ＆ドロップ</p>
      <small>動画・画像・PDF など対応 ／ 最大 1GB</small>
      <div class="browse-btn">ファイルを選択</div>
    </div>

    <div class="sec-hd">
      <h2>アップロード済みファイル</h2>
      <span class="file-count" id="fileCount">0 件</span>
    </div>
    <div id="fileList"><div class="empty-state">ファイルがありません</div></div>

    <div id="footerBar">
      <div>
        <div class="storage-label" id="storageLabel">Cloudinary</div>
        <div class="storage-track"><div class="storage-fill-bar" id="storageFill" style="width:0%"></div></div>
      </div>
      <button class="upload-btn" onclick="document.getElementById('fileInput').click()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
        </svg>
        アップロード
      </button>
    </div>
  </div>
</div>

<script>
const CLOUD_NAME = 'dpond4wd2';
const UPLOAD_PRESET = 'ml_default';
const CHUNK_SIZE = 20 * 1024 * 1024; // 20MB チャンク

let uploadedFiles = JSON.parse(localStorage.getItem('uploaded_files_v2') || '[]');
function saveFiles(){ localStorage.setItem('uploaded_files_v2', JSON.stringify(uploadedFiles)); }

function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function fmtSize(b){
  if(b<1024) return b+'B';
  if(b<1024*1024) return (b/1024).toFixed(1)+'KB';
  if(b<1024*1024*1024) return (b/(1024*1024)).toFixed(1)+'MB';
  return (b/(1024*1024*1024)).toFixed(2)+'GB';
}
function fmtDate(d){ return new Date(d).toLocaleDateString('ja-JP',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'}); }
function fileIcon(name){
  const ext=(name.split('.').pop()||'').toLowerCase();
  if(['mp4','mov','avi','mkv','webm','m4v'].includes(ext)) return {cls:'fi-vid',icon:'🎬'};
  if(['pdf'].includes(ext)) return {cls:'fi-pdf',icon:'📄'};
  if(['png','jpg','jpeg','gif','webp','svg'].includes(ext)) return {cls:'fi-img',icon:'🖼️'};
  if(['doc','docx','txt','md'].includes(ext)) return {cls:'fi-doc',icon:'📝'};
  if(['zip','rar','7z','tar','gz'].includes(ext)) return {cls:'fi-zip',icon:'📦'};
  return {cls:'fi-other',icon:'📎'};
}

function renderFiles(){
  const el = document.getElementById('fileList');
  document.getElementById('fileCount').textContent = uploadedFiles.length + ' 件';
  if(!uploadedFiles.length){ el.innerHTML='<div class="empty-state">ファイルがありません</div>'; return; }
  const totalBytes = uploadedFiles.reduce((s,f)=>s+(f.size||0),0);
  document.getElementById('storageLabel').textContent = '合計: '+fmtSize(totalBytes);
  el.innerHTML = uploadedFiles.map((f,i)=>{
    const {cls,icon}=fileIcon(f.name);
    return `<div class="file-item">
      <div class="file-icon ${cls}">${icon}</div>
      <div class="file-info">
        <div class="file-name">${esc(f.name)}</div>
        <div class="file-meta">${fmtSize(f.size||0)} · ${fmtDate(f.date)}</div>
      </div>
      <div class="file-actions">
        <span class="status-pill s-done">完了</span>
        <a href="${esc(f.url)}" target="_blank" class="icon-btn" title="開く／ダウンロード">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
          </svg>
        </a>
        <button class="icon-btn" title="削除" onclick="deleteFile(${i})">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/>
          </svg>
        </button>
      </div>
    </div>`;
  }).join('');
}

function deleteFile(i){
  if(!confirm(`「${uploadedFiles[i].name}」を削除しますか？`)) return;
  uploadedFiles.splice(i,1); saveFiles(); renderFiles();
}

// チャンクアップロード
async function uploadFileChunked(file){
  const {cls,icon}=fileIcon(file.name);
  const id='up_'+Date.now()+'_'+Math.random().toString(36).slice(2);

  const el=document.getElementById('fileList');
  const emptyState=el.querySelector('.empty-state');
  if(emptyState) emptyState.remove();

  const div=document.createElement('div');
  div.className='file-item'; div.id=id;
  div.innerHTML=`
    <div class="file-icon ${cls}">${icon}</div>
    <div class="file-info">
      <div class="file-name">${esc(file.name)}</div>
      <div class="file-meta" id="${id}_meta">${fmtSize(file.size)} · 準備中...</div>
    </div>
    <div class="file-actions">
      <div style="text-align:right">
        <div class="prog-wrap"><div class="prog-fill" id="${id}_bar" style="width:0%"></div></div>
        <div class="speed-txt" id="${id}_spd"></div>
      </div>
      <span class="status-pill s-uploading" id="${id}_lbl">0%</span>
    </div>`;
  el.prepend(div);
  document.getElementById('statusText').textContent='アップロード中...';

  const totalChunks = Math.ceil(file.size / CHUNK_SIZE);
  const uniqueUploadId = `upl_${Date.now()}_${Math.random().toString(36).slice(2)}`;
  let uploadedUrl = '';
  let startTime = Date.now();

  const updateUI = (loaded, total) => {
    const pct = Math.round(loaded/total*100);
    const bar = document.getElementById(id+'_bar');
    const lbl = document.getElementById(id+'_lbl');
    const spd = document.getElementById(id+'_spd');
    const meta = document.getElementById(id+'_meta');
    if(bar) bar.style.width=pct+'%';
    if(lbl) lbl.textContent=pct+'%';
    const elapsed=(Date.now()-startTime)/1000;
    const speed=loaded/elapsed;
    const remaining=(total-loaded)/speed;
    if(spd) spd.textContent=fmtSize(speed)+'/s';
    if(meta) meta.textContent=`${fmtSize(loaded)} / ${fmtSize(total)} · 残り約${Math.ceil(remaining)}秒`;
  };

  try{
    for(let i=0;i<totalChunks;i++){
      const start=i*CHUNK_SIZE;
      const end=Math.min(start+CHUNK_SIZE, file.size);
      const chunk=file.slice(start,end);

      const fd=new FormData();
      fd.append('file', chunk);
      fd.append('upload_preset', UPLOAD_PRESET);
      fd.append('folder','uploads');

      const res = await new Promise((resolve, reject)=>{
        const xhr=new XMLHttpRequest();
        xhr.open('POST',`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/auto/upload`);
        xhr.setRequestHeader('X-Unique-Upload-Id', uniqueUploadId);
        xhr.setRequestHeader('Content-Range', `bytes ${start}-${end-1}/${file.size}`);

        xhr.upload.onprogress = e => {
          if(!e.lengthComputable) return;
          updateUI(start+e.loaded, file.size);
        };
        xhr.onload=()=>{
          if(xhr.status===200||xhr.status===201||xhr.status===308){
            resolve(JSON.parse(xhr.responseText));
          } else {
            reject(new Error(`HTTP ${xhr.status}: ${xhr.responseText}`));
          }
        };
        xhr.onerror=()=>reject(new Error('ネットワークエラー'));
        xhr.send(fd);
      });

      if(i===totalChunks-1){
        uploadedUrl=res.secure_url;
      }
      updateUI(end, file.size);
    }

    // 完了
    uploadedFiles.unshift({name:file.name, url:uploadedUrl, size:file.size, date:Date.now()});
    saveFiles();
    document.getElementById('statusText').textContent='完了';
    renderFiles();

  } catch(e){
    const lbl=document.getElementById(id+'_lbl');
    if(lbl){lbl.textContent='エラー';lbl.className='status-pill s-error';}
    const meta=document.getElementById(id+'_meta');
    if(meta) meta.textContent='アップロード失敗: '+e.message;
    document.getElementById('statusText').textContent='エラー';
    console.error(e);
  }
}

// ドロップゾーン
const dropZone=document.getElementById('dropZone');
const fileInput=document.getElementById('fileInput');
dropZone.addEventListener('dragover',e=>{e.preventDefault();dropZone.classList.add('dragover');});
dropZone.addEventListener('dragleave',()=>dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop',e=>{
  e.preventDefault(); dropZone.classList.remove('dragover');
  [...e.dataTransfer.files].forEach(uploadFileChunked);
});
fileInput.addEventListener('change',()=>{
  [...fileInput.files].forEach(uploadFileChunked);
  fileInput.value='';
});

renderFiles();
</script>
</body>
</html>
