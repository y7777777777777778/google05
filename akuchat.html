<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>共通チャット</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:      #020408;
    --panel:   rgba(0,255,231,0.03);
    --border:  rgba(0,255,231,0.10);
    --border2: rgba(0,255,231,0.25);
    --accent:  #00ffe7;
    --text:    #c8f0ec;
    --dim:     #3a6660;
    --green:   #3dd68c;
    --red:     #ff4466;
    --amber:   #ffb300;
    --mono:    'Share Tech Mono', monospace;
    --head:    'Rajdhani', sans-serif;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: var(--mono);
    background: var(--bg); color: var(--text);
    height: 100vh; display: flex; flex-direction: column; overflow: hidden;
  }
  body::after {
    content: ''; position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background-image:
      linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 44px 44px;
  }
  /* ヘッダー */
  .header {
    position: relative; z-index: 10;
    display: flex; align-items: center; justify-content: space-between;
    height: 54px; padding: 0 20px;
    background: rgba(0,0,0,0.85); border-bottom: 1px solid var(--border2);
    flex-shrink: 0;
  }
  .header-logo {
    display: flex; align-items: center; gap: 10px;
    font-family: var(--head); font-size: 16px; font-weight: 700;
    letter-spacing: .15em; color: var(--accent);
    text-shadow: 0 0 20px rgba(0,255,231,0.4);
  }
  .logo-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--green); box-shadow: 0 0 8px var(--green);
    animation: blink 2s ease-in-out infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 60%{opacity:.3} }
  .header-right { display: flex; align-items: center; gap: 10px; font-size: 11px; color: var(--dim); }
  .online-count { color: var(--accent); font-size: 13px; font-weight: 700; }

  /* チャットエリア */
  .chat-wrap {
    position: relative; z-index: 1;
    flex: 1; display: flex; flex-direction: column; overflow: hidden;
  }
  #chatMsgs {
    flex: 1; overflow-y: auto; padding: 14px 16px; display: flex; flex-direction: column; gap: 8px;
    background: rgba(0,0,0,0.2);
  }
  #chatMsgs::-webkit-scrollbar { width: 3px; }
  #chatMsgs::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

  .chat-msg {
    display: flex; gap: 8px; align-items: baseline; flex-wrap: wrap;
    padding: 6px 10px; border-radius: 6px; background: rgba(0,255,231,0.02);
    border: 1px solid transparent; transition: border .15s;
  }
  .chat-msg:hover { border-color: var(--border2); }
  .chat-msg-name { font-size: 12px; font-weight: 700; color: var(--dim); flex-shrink: 0; }
  .chat-msg-name.me { color: var(--accent); }
  .chat-msg-name.bot { color: var(--green); }
  .chat-msg-text { color: #d4f0ec; word-break: break-all; flex: 1; font-size: 13px; }
  .chat-msg-time { font-size: 10px; color: var(--dim); flex-shrink: 0; }
  .chat-msg-group {
    font-size: 9px; letter-spacing: .08em;
    padding: 2px 6px; border-radius: 3px; flex-shrink: 0;
  }
  .chat-msg-group.k { background: rgba(0,255,231,0.1); color: var(--accent); border: 1px solid rgba(0,255,231,0.2); }
  .chat-msg-group.g2 { background: rgba(255,179,0,0.1); color: var(--amber); border: 1px solid rgba(255,179,0,0.2); }

  /* 入力エリア */
  .chat-input-area {
    position: relative; z-index: 10;
    display: flex; gap: 10px; align-items: center;
    padding: 12px 16px;
    background: rgba(0,0,0,0.6); border-top: 1px solid var(--border2);
    flex-shrink: 0;
  }
  #chatInput {
    flex: 1; padding: 10px 14px; border-radius: 6px;
    border: 1px solid var(--border2); background: rgba(0,255,231,0.03);
    color: var(--text); font-family: var(--mono); font-size: 13px; outline: none;
    transition: border .15s;
  }
  #chatInput:focus { border-color: var(--accent); }
  #chatInput::placeholder { color: var(--dim); }
  .send-btn {
    padding: 10px 18px; border-radius: 6px;
    border: 1px solid rgba(0,255,231,0.35); background: rgba(0,255,231,0.06);
    color: var(--accent); font-family: var(--mono); font-size: 11px;
    letter-spacing: .1em; cursor: pointer; transition: all .15s; text-transform: uppercase;
    white-space: nowrap;
  }
  .send-btn:hover { background: rgba(0,255,231,0.15); border-color: var(--accent); }
  .send-btn:disabled { opacity: .3; cursor: not-allowed; }

  /* 名前設定モーダル */
  #nameModal {
    display: none; position: fixed; inset: 0; z-index: 100;
    background: rgba(0,0,0,0.8); justify-content: center; align-items: center;
  }
  #nameModal.open { display: flex; }
  .name-box {
    background: #0a1020; border: 1px solid var(--border2); border-radius: 10px;
    padding: 32px; width: 320px; max-width: 90vw; text-align: center;
  }
  .name-box h3 { font-family: var(--head); font-size: 16px; color: var(--accent); margin-bottom: 8px; letter-spacing: .1em; }
  .name-box p { font-size: 11px; color: var(--dim); margin-bottom: 20px; }
  .name-box input {
    width: 100%; padding: 10px 14px; border-radius: 6px;
    border: 1px solid var(--border2); background: rgba(0,255,231,0.03);
    color: var(--text); font-family: var(--mono); font-size: 14px; outline: none;
    margin-bottom: 16px; transition: border .15s;
  }
  .name-box input:focus { border-color: var(--accent); }
  .name-box button {
    width: 100%; padding: 11px; border-radius: 6px;
    border: 1px solid rgba(0,255,231,0.4); background: rgba(0,255,231,0.08);
    color: var(--accent); font-family: var(--mono); font-size: 12px;
    letter-spacing: .1em; cursor: pointer; text-transform: uppercase; transition: all .15s;
  }
  .name-box button:hover { background: rgba(0,255,231,0.18); }
</style>
</head>
<body>

<div class="header">
  <div class="header-logo">
    <div class="logo-dot"></div>
    GLOBAL CHAT
  </div>
  <div class="header-right">
    <span>オンライン: </span><span class="online-count" id="onlineCount">-</span>
    <span style="margin-left:8px;font-size:11px;color:var(--dim);" id="myNameDisp"></span>
  </div>
</div>

<div class="chat-wrap">
  <div id="chatMsgs"></div>
  <div class="chat-input-area">
    <input id="chatInput" placeholder="メッセージを入力..." maxlength="200" autocomplete="off">
    <button class="send-btn" id="sendBtn" onclick="sendMsg()">送信</button>
  </div>
</div>

<!-- 名前モーダル -->
<div id="nameModal" class="open">
  <div class="name-box">
    <h3>NAME SET</h3>
    <p>チャットに使用する名前を入力してください<br>（申請時の名前と同じにしてください）</p>
    <input id="nameInput" placeholder="名前を入力..." maxlength="20">
    <button onclick="setName()">参加する</button>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
  import { getFirestore, collection, addDoc, query, orderBy, limit,
           onSnapshot, serverTimestamp, getDocs, where }
    from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey:            "AIzaSyDmv5WbPp6298HNLSOa6h0AMuieM0H6l1s",
    authDomain:        "fir-66339.firebaseapp.com",
    projectId:         "fir-66339",
    storageBucket:     "fir-66339.firebasestorage.app",
    messagingSenderId: "876017617963",
    appId:             "1:876017617963:web:5ba304f8f6e0d9dff0ae6e"
  };

  const app = initializeApp(firebaseConfig);
  const db  = getFirestore(app);

  // 共通チャットコレクション
  const CHAT_COL = "chat_all";

  let myName  = localStorage.getItem("chatName_all") || "";
  let myGroup = "?";

  // 名前があれば即開始
  if (myName) {
    document.getElementById("nameModal").classList.remove("open");
    document.getElementById("myNameDisp").textContent = myName;
    startChat();
  }

  // グループ取得
  async function fetchMyGroup(name) {
    try {
      const snap = await getDocs(query(collection(db, "users"), where("name", "==", name)));
      if (!snap.empty) myGroup = snap.docs[0].data().group || "k";
    } catch(e) {}
  }

  window.setName = async function() {
    const v = document.getElementById("nameInput").value.trim();
    if (!v) return;
    myName = v;
    localStorage.setItem("chatName_all", v);
    document.getElementById("nameModal").classList.remove("open");
    document.getElementById("myNameDisp").textContent = v;
    startChat();
  };
  document.getElementById("nameInput").addEventListener("keydown", e => { if(e.key==="Enter") window.setName(); });

  function startChat() {
    fetchMyGroup(myName);
    listenMessages();
    document.getElementById("chatInput").focus();
  }

  // メッセージ送信
  window.sendMsg = async function() {
    const input = document.getElementById("chatInput");
    const text  = input.value.trim();
    if (!text || !myName) return;
    input.value = "";
    try {
      await addDoc(collection(db, CHAT_COL), {
        name:  myName,
        text:  text,
        group: myGroup,
        ts:    serverTimestamp()
      });
    } catch(e) { console.error(e); }
  };
  document.getElementById("chatInput").addEventListener("keydown", e => {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); window.sendMsg(); }
  });

  // メッセージ受信
  function listenMessages() {
    const q = query(collection(db, CHAT_COL), orderBy("ts", "desc"), limit(80));
    onSnapshot(q, snap => {
      const msgs = snap.docs.map(d => ({ id: d.id, ...d.data() })).reverse();
      document.getElementById("onlineCount").textContent = new Set(msgs.slice(-20).map(m => m.name)).size;
      const box = document.getElementById("chatMsgs");
      const wasBottom = box.scrollHeight - box.scrollTop - box.clientHeight < 60;
      box.innerHTML = msgs.map(m => {
        const isMe  = m.name === myName;
        const isBot = m.name === "SYSTEM";
        const grpClass = m.group === "2" ? "g2" : "k";
        const grpLabel = m.group || "k";
        const time = m.ts ? new Date(m.ts.seconds*1000).toLocaleTimeString("ja-JP",{hour:"2-digit",minute:"2-digit"}) : "";
        return '<div class="chat-msg">' +
          '<span class="chat-msg-name' + (isMe?' me':isBot?' bot':'') + '">' + esc(m.name) + '</span>' +
          '<span class="chat-msg-group ' + grpClass + '">' + esc(grpLabel) + '</span>' +
          '<span class="chat-msg-text">' + esc(m.text) + '</span>' +
          '<span class="chat-msg-time">' + time + '</span>' +
          '</div>';
      }).join('');
      if (wasBottom) box.scrollTop = box.scrollHeight;
    });
  }

  function esc(s) {
    return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
</script>
</body>
</html>
