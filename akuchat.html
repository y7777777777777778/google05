<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>共通チャット</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:      #020408;
    --panel:   rgba(0,255,231,0.03);
    --border:  rgba(0,255,231,0.10);
    --border2: rgba(0,255,231,0.25);
    --accent:  #00ffe7;
    --text:    #c8f0ec;
    --dim:     #3a6660;
    --green:   #3dd68c;
    --red:     #ff4466;
    --amber:   #ffb300;
    --mono:    'Share Tech Mono', monospace;
    --head:    'Rajdhani', sans-serif;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body { font-family: var(--mono); background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
  body::after { content: ''; position: fixed; inset: 0; z-index: 0; pointer-events: none; background-image: linear-gradient(var(--border) 1px, transparent 1px), linear-gradient(90deg, var(--border) 1px, transparent 1px); background-size: 44px 44px; }

  .header { position: relative; z-index: 10; display: flex; align-items: center; justify-content: space-between; height: 54px; padding: 0 20px; background: rgba(0,0,0,0.85); border-bottom: 1px solid var(--border2); flex-shrink: 0; }
  .header-logo { display: flex; align-items: center; gap: 10px; font-family: var(--head); font-size: 16px; font-weight: 700; letter-spacing: .15em; color: var(--accent); text-shadow: 0 0 20px rgba(0,255,231,0.4); }
  .logo-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); box-shadow: 0 0 8px var(--green); animation: blink 2s ease-in-out infinite; }
  @keyframes blink { 0%,100%{opacity:1} 60%{opacity:.3} }
  .header-right { display: flex; align-items: center; gap: 10px; font-size: 11px; color: var(--dim); }
  .online-count { color: var(--accent); font-size: 13px; font-weight: 700; }

  .chat-wrap { position: relative; z-index: 1; flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  #chatMsgs { flex: 1; overflow-y: auto; padding: 14px 16px; display: flex; flex-direction: column; gap: 8px; background: rgba(0,0,0,0.2); }
  #chatMsgs::-webkit-scrollbar { width: 3px; }
  #chatMsgs::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

  .chat-msg { display: flex; gap: 8px; align-items: baseline; flex-wrap: wrap; padding: 6px 10px; border-radius: 6px; background: rgba(0,255,231,0.02); border: 1px solid transparent; transition: border .15s; }
  .chat-msg:hover { border-color: var(--border2); }
  .chat-msg-name { font-size: 12px; font-weight: 700; color: var(--dim); flex-shrink: 0; }
  .chat-msg-name.me { color: var(--accent); }
  .chat-msg-name.bot { color: var(--green); }
  .chat-msg-text { color: #d4f0ec; word-break: break-all; flex: 1; font-size: 13px; }
  .chat-msg-time { font-size: 10px; color: var(--dim); flex-shrink: 0; }
  .chat-msg-group { font-size: 9px; letter-spacing: .08em; padding: 2px 6px; border-radius: 3px; flex-shrink: 0; }
  .chat-msg-group.k  { background: rgba(0,255,231,0.1); color: var(--accent); border: 1px solid rgba(0,255,231,0.2); }
  .chat-msg-group.g2 { background: rgba(255,179,0,0.1); color: var(--amber); border: 1px solid rgba(255,179,0,0.2); }

  .chat-input-area { position: relative; z-index: 10; display: flex; gap: 10px; align-items: center; padding: 12px 16px; background: rgba(0,0,0,0.6); border-top: 1px solid var(--border2); flex-shrink: 0; }
  #chatInput { flex: 1; padding: 10px 14px; border-radius: 6px; border: 1px solid var(--border2); background: rgba(0,255,231,0.03); color: var(--text); font-family: var(--mono); font-size: 13px; outline: none; transition: border .15s; }
  #chatInput:focus { border-color: var(--accent); }
  #chatInput::placeholder { color: var(--dim); }
  .send-btn { padding: 10px 18px; border-radius: 6px; border: 1px solid rgba(0,255,231,0.35); background: rgba(0,255,231,0.06); color: var(--accent); font-family: var(--mono); font-size: 11px; letter-spacing: .1em; cursor: pointer; transition: all .15s; text-transform: uppercase; white-space: nowrap; }
  .send-btn:hover { background: rgba(0,255,231,0.15); border-color: var(--accent); }
  .send-btn:disabled { opacity: .3; cursor: not-allowed; }

  /* モーダル共通 */
  .modal { display: none; position: fixed; inset: 0; z-index: 100; background: rgba(0,0,0,0.85); justify-content: center; align-items: center; }
  .modal.open { display: flex; }
  .modal-box { background: #0a1020; border: 1px solid var(--border2); border-radius: 10px; padding: 32px; width: 340px; max-width: 90vw; text-align: center; }
  .modal-box h3 { font-family: var(--head); font-size: 16px; color: var(--accent); margin-bottom: 8px; letter-spacing: .1em; }
  .modal-box p { font-size: 11px; color: var(--dim); margin-bottom: 20px; line-height: 1.6; }
  .modal-box input { width: 100%; padding: 10px 14px; border-radius: 6px; border: 1px solid var(--border2); background: rgba(0,255,231,0.03); color: var(--text); font-family: var(--mono); font-size: 14px; outline: none; margin-bottom: 14px; transition: border .15s; }
  .modal-box input:focus { border-color: var(--accent); }
  .modal-box .err { font-size: 11px; color: var(--red); margin: -8px 0 10px; }
  .modal-box button { width: 100%; padding: 11px; border-radius: 6px; border: 1px solid rgba(0,255,231,0.4); background: rgba(0,255,231,0.08); color: var(--accent); font-family: var(--mono); font-size: 12px; letter-spacing: .1em; cursor: pointer; text-transform: uppercase; transition: all .15s; }
  .modal-box button:hover { background: rgba(0,255,231,0.18); }
  .modal-box button:disabled { opacity: .4; cursor: not-allowed; }

  /* アクセス拒否画面 */
  #blockedScreen { display: none; position: fixed; inset: 0; z-index: 200; background: var(--bg); justify-content: center; align-items: center; flex-direction: column; gap: 16px; }
  #blockedScreen.show { display: flex; }
  .blocked-icon { font-size: 48px; }
  .blocked-msg { font-family: var(--head); font-size: 18px; color: var(--red); letter-spacing: .1em; }
  .blocked-sub { font-size: 11px; color: var(--dim); }
</style>
</head>
<body>

<div class="header">
  <div class="header-logo">
    <div class="logo-dot"></div>
    GLOBAL CHAT
  </div>
  <div class="header-right">
    <span>オンライン: </span><span class="online-count" id="onlineCount">-</span>
    <span style="margin-left:8px;font-size:11px;color:var(--dim);" id="myNameDisp"></span>
  </div>
</div>

<div class="chat-wrap">
  <div id="chatMsgs"></div>
  <div class="chat-input-area">
    <input id="chatInput" placeholder="メッセージを入力..." maxlength="200" autocomplete="off">
    <button class="send-btn" onclick="sendMsg()">送信</button>
  </div>
</div>

<!-- 名前入力モーダル -->
<div id="nameModal" class="modal open">
  <div class="modal-box">
    <h3>NAME SET</h3>
    <p>申請時に登録した名前を入力してください。<br>許可されていないと入れません。</p>
    <input id="nameInput" placeholder="名前を入力..." maxlength="20">
    <div class="err" id="nameErr"></div>
    <button id="nameBtn" onclick="submitName()">確認して入室</button>
  </div>
</div>

<!-- アクセス拒否画面 -->
<div id="blockedScreen">
  <div class="blocked-icon">🚫</div>
  <div class="blocked-msg" id="blockedMsg">アクセスできません</div>
  <div class="blocked-sub" id="blockedSub"></div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
  import { getFirestore, collection, addDoc, query, orderBy, limit,
           onSnapshot, serverTimestamp, getDocs, where, getDoc, doc }
    from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey:            "AIzaSyDmv5WbPp6298HNLSOa6h0AMuieM0H6l1s",
    authDomain:        "fir-66339.firebaseapp.com",
    projectId:         "fir-66339",
    storageBucket:     "fir-66339.firebasestorage.app",
    messagingSenderId: "876017617963",
    appId:             "1:876017617963:web:5ba304f8f6e0d9dff0ae6e"
  };

  const app = initializeApp(firebaseConfig);
  const db  = getFirestore(app);
  const CHAT_COL = "chat_all";

  let myName  = "";
  let myGroup = "k";

  // ── ユーザー情報をFirestoreから取得 ──
  async function fetchUser(name) {
    const snap = await getDocs(query(collection(db, "users"), where("name", "==", name)));
    if (snap.empty) return null;
    return snap.docs[0].data();
  }

  // ── 名前入力して入室 ──
  window.submitName = async function() {
    const input = document.getElementById("nameInput");
    const btn   = document.getElementById("nameBtn");
    const err   = document.getElementById("nameErr");
    const name  = input.value.trim();
    if (!name) { err.textContent = "名前を入力してください"; return; }

    btn.disabled = true;
    btn.textContent = "確認中...";
    err.textContent = "";

    try {
      // アク禁チェック（全員）
      const banSnap = await getDoc(doc(db, "config", "banList"));
      if (banSnap.exists()) {
        if (banSnap.data().allBanned) { showBlocked("全員アクセス停止中です", ""); return; }
        if ((banSnap.data().names || []).includes(name)) { showBlocked("アクセスが停止されています", name); return; }
      }

      // ユーザー確認
      const user = await fetchUser(name);
      if (!user) {
        err.textContent = "その名前は登録されていません";
        btn.disabled = false; btn.textContent = "確認して入室";
        return;
      }
      if (user.status === "ng") { showBlocked("アクセスが拒否されています", name); return; }
      if (user.status === "wait") {
        err.textContent = "まだ承認待ちです。管理者の許可をお待ちください。";
        btn.disabled = false; btn.textContent = "確認して入室";
        return;
      }

      // status === "ok" → 入室
      myName  = name;
      myGroup = user.group || "k";
      localStorage.setItem("chatName_all", name);
      document.getElementById("nameModal").classList.remove("open");
      document.getElementById("myNameDisp").textContent = name;
      startChat();

    } catch(e) {
      err.textContent = "エラーが発生しました。再度お試しください。";
      btn.disabled = false; btn.textContent = "確認して入室";
      console.error(e);
    }
  };

  document.getElementById("nameInput").addEventListener("keydown", e => {
    if (e.key === "Enter") window.submitName();
  });

  function showBlocked(msg, sub) {
    document.getElementById("blockedMsg").textContent = msg;
    document.getElementById("blockedSub").textContent = sub ? "名前: " + sub : "";
    document.getElementById("blockedScreen").classList.add("show");
  }

  // キャッシュされた名前があれば自動ログイン試行
  const cached = localStorage.getItem("chatName_all");
  if (cached) {
    document.getElementById("nameInput").value = cached;
    window.submitName();
  }

  function startChat() {
    listenMessages();
    document.getElementById("chatInput").focus();
  }

  // ── メッセージ送信 ──
  window.sendMsg = async function() {
    if (!myName) return;
    const input = document.getElementById("chatInput");
    const text  = input.value.trim();
    if (!text) return;
    input.value = "";
    try {
      await addDoc(collection(db, CHAT_COL), {
        name:  myName,
        text:  text,
        group: myGroup,
        ts:    serverTimestamp()
      });
    } catch(e) { console.error(e); }
  };

  document.getElementById("chatInput").addEventListener("keydown", e => {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); window.sendMsg(); }
  });

  // ── メッセージ受信 ──
  function listenMessages() {
    const q = query(collection(db, CHAT_COL), orderBy("ts", "desc"), limit(80));
    onSnapshot(q, snap => {
      const msgs = snap.docs.map(d => ({ id: d.id, ...d.data() })).reverse();
      document.getElementById("onlineCount").textContent =
        new Set(msgs.slice(-20).map(m => m.name)).size;
      const box = document.getElementById("chatMsgs");
      const wasBottom = box.scrollHeight - box.scrollTop - box.clientHeight < 60;
      box.innerHTML = msgs.map(m => {
        const isMe     = m.name === myName;
        const isBot    = m.name === "SYSTEM";
        const grpClass = m.group === "2" ? "g2" : "k";
        const grpLabel = m.group || "k";
        const time     = m.ts
          ? new Date(m.ts.seconds * 1000).toLocaleTimeString("ja-JP", { hour: "2-digit", minute: "2-digit" })
          : "";
        return '<div class="chat-msg">' +
          '<span class="chat-msg-name' + (isMe ? ' me' : isBot ? ' bot' : '') + '">' + esc(m.name) + '</span>' +
          '<span class="chat-msg-group ' + grpClass + '">' + esc(grpLabel) + '</span>' +
          '<span class="chat-msg-text">' + esc(m.text) + '</span>' +
          '<span class="chat-msg-time">' + time + '</span>' +
          '</div>';
      }).join('');
      if (wasBottom) box.scrollTop = box.scrollHeight;
    });
  }

  function esc(s) {
    return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }
</script>
</body>
</html>
