<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Secret Page [k]</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:      #020408;
      --panel:   rgba(0,255,231,0.03);
      --border:  rgba(0,255,231,0.12);
      --border2: rgba(0,255,231,0.25);
      --accent:  #00ffe7;
      --accent2: #00a8ff;
      --text:    #c8f0ec;
      --dim:     #3a6660;
      --dim2:    #1e3835;
      --red:     #ff4466;
      --mono:    'Share Tech Mono', monospace;
      --head:    'Rajdhani', sans-serif;
    }
    body.light {
      --bg:      #ffffff;
      --panel:   #f8f9fa;
      --border:  #ddd;
      --border2: #bbb;
      --accent:  #222;
      --accent2: #555;
      --text:    #222;
      --dim:     #666;
      --dim2:    #aaa;
      --red:     #cc2244;
    }
    body.light #starCanvas { display: none; }
    body.light .grid-bg { display: none; }
    body.light .scanlines { display: none; }
    body.light .bottom-line { display: none; }
    body.light .corner { display: none; }
    body.light .card {
      border-radius: 12px; border: 1px solid #ddd; background: #fff;
      box-shadow: 0 2px 8px rgba(0,0,0,0.07);
    }
    body.light .card:hover { border-color: #bbb; box-shadow: 0 6px 18px rgba(0,0,0,0.12); transform: translateY(-3px); }
    body.light .card::before, body.light .card::after { display: none; }
    body.light .card-title { font-family: "Segoe UI", Arial, sans-serif; font-size: 15px; font-weight: 600; color: #222; }
    body.light .card:hover .card-title { color: #222; }
    body.light .card-desc { font-family: "Segoe UI", Arial, sans-serif; font-size: 12px; color: #888; }
    body.light .card-id { color: #ccc; }
    body.light .card-arrow { color: #ccc; }
    body.light .card:hover .card-arrow { color: #888; transform: translate(2px,-2px); }
    body.light .sec-tag { color: #888; font-family: "Segoe UI", Arial, sans-serif; font-size: 11px; letter-spacing: .06em; }
    body.light .sec-bar { background: #ddd; }
    body.light .sec-num { color: #ccc; }
    body.light .hbtn {
      font-family: "Segoe UI", Arial, sans-serif;
      font-size: 13px; letter-spacing: 0; text-transform: none;
      border-radius: 6px; padding: 7px 16px;
    }
    body.light .hbtn:hover { color: #222; border-color: #bbb; background: #f0f0f0; box-shadow: none; }
    body.light .iframe-bar { background: #f5f5f5; border-bottom: 1px solid #ddd; }
    body.light .iframe-url { font-family: "Segoe UI", Arial, sans-serif; }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }

    body {
      font-family: var(--mono);
      background: var(--bg); color: var(--text);
      display: flex; flex-direction: column;
      height: 100vh; overflow: hidden;
      transition: background .4s, color .4s;
    }

    #starCanvas { position: fixed; inset: 0; z-index: 0; pointer-events: none; }

    .grid-bg {
      position: fixed; inset: 0; z-index: 1; pointer-events: none;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 44px 44px;
    }

    .scanlines {
      position: fixed; inset: 0; z-index: 2; pointer-events: none;
      background: repeating-linear-gradient(
        0deg, rgba(0,0,0,0.06) 0px, rgba(0,0,0,0.06) 1px,
        transparent 1px, transparent 3px
      );
    }

    .bottom-line {
      position: fixed; bottom: 0; left: 0; right: 0; height: 2px; z-index: 20;
      background: linear-gradient(90deg, transparent, var(--accent2), var(--accent), var(--accent2), transparent);
      background-size: 200% 100%;
      animation: scanMove 3s linear infinite;
    }
    @keyframes scanMove { from{background-position:100% 0} to{background-position:-100% 0} }

    .corner { position: fixed; z-index: 5; width: 20px; height: 20px; pointer-events: none; }
    .corner::before, .corner::after { content: ''; position: absolute; background: var(--accent); }
    .corner::before { width: 2px; height: 100%; }
    .corner::after  { width: 100%; height: 2px; }
    .corner-tl { top: 10px; left: 10px; }
    .corner-tr { top: 10px; right: 10px; transform: scaleX(-1); }
    .corner-bl { bottom: 14px; left: 10px; transform: scaleY(-1); }
    .corner-br { bottom: 14px; right: 10px; transform: scale(-1); }

    /* メイン */
    .main {
      position: relative; z-index: 10;
      flex: 1; overflow-y: auto; padding: 28px 24px 40px;
    }
    .main::-webkit-scrollbar { width: 3px; }
    .main::-webkit-scrollbar-track { background: transparent; }
    .main::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

    .sec {
      display: flex; align-items: center; gap: 12px;
      margin-bottom: 16px; animation: fadeUp .4s .05s ease both;
    }
    .sec-tag { font-size: 10px; letter-spacing: .2em; color: var(--accent); text-transform: uppercase; white-space: nowrap; }
    .sec-bar { flex: 1; height: 1px; background: linear-gradient(90deg, var(--border2), transparent); }
    .sec-num { font-size: 10px; color: var(--dim2); letter-spacing: .08em; }

    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; }

    .card {
      position: relative; border: 1px solid var(--border); border-radius: 6px;
      padding: 16px 15px 14px; background: var(--panel);
      cursor: pointer; text-align: left;
      transition: border .2s, transform .2s, box-shadow .2s;
      display: flex; flex-direction: column; gap: 6px;
      overflow: hidden; animation: fadeUp .45s ease both;
    }
    .card::before { content: ''; position: absolute; top: 0; left: 0; width: 28px; height: 2px; background: var(--accent); opacity: 0; transition: opacity .2s; }
    .card::after  { content: ''; position: absolute; top: 0; left: 0; width: 2px; height: 28px; background: var(--accent); opacity: 0; transition: opacity .2s; }
    .card:hover { border-color: var(--border2); transform: translateY(-2px); box-shadow: 0 6px 28px rgba(0,255,231,0.07), inset 0 0 30px rgba(0,255,231,0.03); }
    .card:hover::before, .card:hover::after { opacity: 1; }

    .card-header { display: flex; align-items: center; justify-content: space-between; }
    .card-id { font-size: 9px; letter-spacing: .14em; color: var(--dim2); }
    .card-title { font-family: var(--head); font-size: 15px; font-weight: 600; letter-spacing: .04em; color: var(--text); transition: color .2s; line-height: 1.3; }
    .card:hover .card-title { color: var(--accent); }
    .card-desc { font-size: 10px; color: var(--dim); line-height: 1.6; letter-spacing: .02em; }
    .card-arrow { align-self: flex-end; font-size: 13px; color: var(--dim2); transition: color .2s, transform .2s; margin-top: 2px; }
    .card:hover .card-arrow { color: var(--accent); transform: translate(2px,-2px); }

    /* iframeエリア */
    #iframeWrap {
      display: none; flex-direction: column;
      flex: 1; overflow: hidden; position: relative; z-index: 10;
    }
    .iframe-bar {
      display: flex; align-items: center; gap: 10px;
      height: 38px; padding: 0 16px;
      background: rgba(0,0,0,0.5); border-bottom: 1px solid var(--border2); flex-shrink: 0;
    }
    body.light .iframe-bar { background: rgba(255,255,255,0.8); }
    .iframe-url { font-size: 10px; color: var(--dim); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; letter-spacing: .03em; }
    #iframe { width: 100%; flex: 1; border: none; display: block; }

    .hbtn {
      font-family: var(--mono); font-size: 12px; letter-spacing: .1em;
      padding: 7px 18px; border: 1px solid var(--border2); border-radius: 5px;
      background: rgba(0,255,231,0.05); color: var(--text);
      cursor: pointer; transition: all .2s; text-transform: uppercase; font-weight: 500;
    }
    .hbtn:hover { color: var(--accent); border-color: var(--accent); background: rgba(0,255,231,0.10); box-shadow: 0 0 14px rgba(0,255,231,0.2); }

    @keyframes fadeUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
  </style>
</head>
<body>

<canvas id="starCanvas"></canvas>
<div class="grid-bg"></div>
<div class="scanlines"></div>
<div class="bottom-line"></div>
<div class="corner corner-tl"></div>
<div class="corner corner-tr"></div>
<div class="corner corner-bl"></div>
<div class="corner corner-br"></div>

<!-- メイン -->
<div class="main" id="menu">
  <div class="sec">
    <span class="sec-tag">// ACCESS_MENU</span>
    <div class="sec-bar"></div>
    <span class="sec-num" id="entryCount">— ENTRIES</span>
  </div>
  <div class="grid" id="cardGrid"></div>
</div>

<!-- iframeエリア -->
<div id="iframeWrap">
  <div class="iframe-bar">
    <button class="hbtn" onclick="goHome()">← BACK</button>
    <span class="iframe-url" id="iframeUrl"></span>
  </div>
  <iframe id="iframe" allowfullscreen></iframe>
</div>

<script>
  /* 星空 */
  const canvas = document.getElementById('starCanvas');
  const ctx = canvas.getContext('2d');
  function resize() { canvas.width=window.innerWidth; canvas.height=window.innerHeight; }
  window.addEventListener('resize', resize); resize();
  const stars = Array.from({length:140}, ()=>({
    x:Math.random()*canvas.width, y:Math.random()*canvas.height,
    r:Math.random()*1.2+0.2, s:Math.random()*0.25+0.04, a:Math.random()*0.5+0.15
  }));
  (function drawStars() {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    stars.forEach(s=>{
      ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(180,230,255,${s.a})`; ctx.fill();
      s.y+=s.s;
      if(s.y>canvas.height+2){s.y=-2;s.x=Math.random()*canvas.width;}
    });
    requestAnimationFrame(drawStars);
  })();

  function goHome() {
    document.getElementById('iframeWrap').style.display='none';
    document.getElementById('iframe').src='';
    document.getElementById('menu').style.display='block';
  }
  function openSite(url) {
    document.getElementById('menu').style.display='none';
    const wrap=document.getElementById('iframeWrap');
    wrap.style.display='flex';
    document.getElementById('iframeUrl').textContent=url;
    document.getElementById('iframe').src=url;
  }

  /* Ctrl+U で隠す */
  document.addEventListener('keydown', e=>{
    if(e.ctrlKey&&e.key==='u'){
      e.preventDefault();
      try {
        if(window.parent!==window){
          const f=window.parent.document.getElementById('hiddenFrame');
          if(f){f.style.display='none';return;}
        }
      }catch(e){}
    }
  });

  /* カード */
  const defaultCards = [
    {id:'NODE_01', title:'管理画面', desc:'kanri.html', url:'kanri.html'},
    {id:'NODE_02', title:'通常',     desc:'peji.html',  url:'peji.html'},
  ];
  function escHtml(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
  function escAttr(s){return String(s||'').replace(/'/g,'&#39;').replace(/"/g,'&quot;');}

  window.renderCards=function(extraCards){
    const grid=document.getElementById('cardGrid');
    const all=[...defaultCards,...(extraCards||[])];
    document.getElementById('entryCount').textContent=String(all.length).padStart(2,'0')+' ENTRIES';
    grid.innerHTML=all.map((c,i)=>`
      <div class="card" onclick="openSite('${escAttr(c.url)}')" style="animation-delay:${0.06+i*0.04}s">
        <div class="card-header"><span class="card-id">${escHtml(c.id||'NODE_'+String(i+1).padStart(2,'0'))}</span></div>
        <div class="card-title">${escHtml(c.title)}</div>
        <div class="card-desc">${escHtml(c.desc)}</div>
        <span class="card-arrow">→</span>
      </div>`).join('');
  };
  renderCards([]);
</script>

<!-- Firebase（追加カードのみ） -->

  onSnapshot(doc(db,"config","extraCards_k"), snap=>{
    window.renderCards(snap.exists()?(snap.data().cards||[]):[]);
  });
</script>
</body>
</html>
